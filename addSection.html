<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sections UI - Toggle Views</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            bg: '#f8f9fc',
                            border: '#e5e7eb',
                            textMuted: '#6b7280',
                            textDark: '#111827',
                            blue: '#134E8E',
                            red: '#C00707',
                            orange: '#FF4400',
                            yellow: '#FFB33F'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        i[class^="fi-"] { display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
        /* Hide scrollbar for a cleaner look on mobile tables */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Dropdown animation */
        .dropdown-enter { animation: drop-in 0.15s ease-out forwards; transform-origin: top right; }
        @keyframes drop-in {
            0% { opacity: 0; transform: scale(0.95) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="bg-brand-bg font-sans min-h-screen p-4 sm:p-6 md:p-8">

    <div class="max-w-full w-full mx-auto">
        
        <!-- Header Section (Updated for Mobile Responsiveness) -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl sm:text-[22px] font-semibold text-gray-900 leading-tight">Sections</h1>
                <p class="text-[12px] sm:text-[13px] text-gray-500 mt-0.5 sm:mt-1">Manage candidate sections</p>
            </div>
            
            <div class="flex items-center ml-4">
                <!-- Add Section Button -->
                <button onclick="window.openSectionSidebar()" class="flex items-center justify-center gap-2 w-10 h-10 sm:w-auto sm:px-5 sm:py-2.5 bg-[#FFB33F] border border-transparent rounded-full text-[13px] font-bold text-[#111827] hover:bg-opacity-90 transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 whitespace-nowrap p-0">
                    <i class="fi fi-rr-add text-sm sm:text-[13px]"></i>
                    <span class="hidden sm:block">Add Section</span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] overflow-hidden">
            
            <!-- Toolbar -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 border-b border-gray-100 gap-4 sm:gap-0">
                
                <!-- View Toggles -->
                <div class="flex bg-gray-100/80 p-1 rounded-lg items-center w-full sm:w-auto overflow-x-auto no-scrollbar border border-gray-200/60">
                    <!-- Table Button (Active by default) -->
                    <button id="btn-table" onclick="switchView('table')" class="bg-white shadow-sm text-[#111827] text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap">
                        <i class="fi fi-rr-table-list text-xs shrink-0"></i>
                        Table
                    </button>
                    <!-- Cards Button -->
                    <button id="btn-cards" onclick="switchView('cards')" class="text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap">
                        <i class="fi fi-rr-grid text-xs shrink-0"></i>
                        Cards
                    </button>
                </div>

                <!-- Search -->
                <div class="flex items-center gap-3 w-full sm:w-auto mt-3 sm:mt-0">
                    <div class="relative w-full sm:w-64">
                        <i class="fi fi-rr-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" id="search-sections" oninput="applySectionFilters()" placeholder="Search sections..." 
                            class="w-full pl-8 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-full text-[13px] focus:outline-none focus:ring-2 focus:ring-[#FFB33F]/30 focus:border-[#FFB33F] transition-all">
                    </div>
                </div>
            </div>

            <!-- Global Bulk Action Header -->
            <div id="bulk-header" class="hidden flex items-center justify-between py-2.5 px-6 border-b border-gray-100 bg-blue-50/50">
                <div class="flex items-center space-x-4">
                    <div onclick="toggleAllSections(event)" class="w-5 h-5 rounded-full flex items-center justify-center bg-[#FFC107] cursor-pointer shadow-sm hover:scale-105 transition-transform">
                        <i class="fi fi-rr-check text-[10px] text-white"></i>
                    </div>
                    <span class="text-[13px] font-semibold text-gray-800"><span id="selected-count-text">1</span> selected</span>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="deleteSelectedSections()" class="flex items-center justify-center gap-2 px-4 py-1.5 bg-[#DC2626] border border-transparent rounded-md text-[13px] font-medium text-white hover:bg-red-700 shadow-sm transition-colors">
                        <i class="fi fi-rr-trash text-sm"></i>
                        Delete Selected
                    </button>
                </div>
            </div>

            <!-- ================= TABLE VIEW ================= -->
            <div id="view-table" class="block w-full overflow-x-auto">
                <div id="section-table-container" class="w-full min-w-[800px]">
                    <!-- Standard Header -->
                    <div id="standard-header" class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-[#FAFAFA]">
                        <div class="col-span-1 flex items-center">
                            <div onclick="toggleAllSections(event)" class="w-5 h-5 rounded-full border-2 border-gray-200 hover:border-[#FFC107] cursor-pointer transition-colors" id="master-checkbox"></div>
                        </div>
                        <div class="col-span-4 text-[13px] font-medium text-gray-700">Section Name</div>
                        <div class="col-span-3 text-[13px] font-medium text-gray-700">Classes</div>
                        <div class="col-span-1 text-[13px] font-medium text-gray-700 text-center">Status</div>
                        <div class="col-span-2 text-[13px] font-medium text-gray-700 text-center">Created At</div>
                        <div class="col-span-1 text-[13px] font-medium text-gray-700 text-right">Actions</div>
                    </div>
                    
                    <!-- Table Body -->
                    <div id="section-table-list"></div>
                </div>
            </div>

            <!-- ================= CARDS VIEW ================= -->
            <div id="view-cards" class="hidden p-6 bg-gray-50/50">
                <div id="section-cards-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            </div>

            <!-- Footer / Pagination -->
            <div class="flex flex-col sm:flex-row justify-between items-center py-3 px-4 sm:px-6 bg-white border-t border-gray-100 text-[13px] text-gray-600">
                <div class="flex items-center space-x-2 sm:space-x-3 mb-3 sm:mb-0">
                    <span id="results-count">Showing results</span>
                    <span class="text-gray-300 text-[10px] hidden sm:inline">●</span>
                    <div class="relative ml-2 sm:ml-0">
                        <select class="appearance-none border border-gray-200 rounded-md py-1 pl-2 pr-6 bg-white text-gray-700 outline-none hover:border-gray-300 cursor-pointer">
                            <option>15</option>
                            <option>30</option>
                            <option>50</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                            <i class="fi fi-rr-angle-small-down text-[10px]"></i>
                        </div>
                    </div>
                </div>

                <div class="flex items-center space-x-3 sm:space-x-4">
                    <button class="w-7 h-7 flex items-center justify-center rounded-md border border-gray-200 text-gray-400 cursor-not-allowed bg-gray-50/50">
                        <i class="fi fi-rr-angle-small-left text-xs"></i>
                    </button>
                    <span class="text-gray-600 text-[12px] sm:text-[13px]">Page 1 of 0</span>
                    <button class="w-7 h-7 flex items-center justify-center rounded-md border border-gray-200 text-gray-400 cursor-not-allowed bg-gray-50/50">
                        <i class="fi fi-rr-angle-small-right text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Action Menu -->
    <div id="global-action-menu" class="hidden fixed w-36 bg-white border border-gray-200 rounded-lg shadow-xl z-[100] py-1 overflow-hidden dropdown-enter">
        <button id="btn-view" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-gray-700 hover:bg-gray-50 flex items-center transition-colors">
            <i class="fi fi-rr-eye text-[15px] mr-2.5 text-gray-500"></i> View
        </button>
        <button id="btn-edit" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-gray-700 hover:bg-gray-50 flex items-center transition-colors">
            <i class="fi fi-rr-edit text-[15px] mr-2.5 text-gray-500"></i> Edit
        </button>
        <div class="border-t border-gray-100 my-0.5"></div>
        <button id="btn-delete" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-red-600 hover:bg-red-50 flex items-center transition-colors">
            <i class="fi fi-rr-trash text-[15px] mr-2.5 text-red-500"></i> Delete
        </button>
    </div>

    <!-- Add Section Sidebar -->
    <div id="sectionOverlay" onclick="window.closeSectionSidebar()" class="fixed inset-0 bg-gray-900/60 z-[60] hidden transition-opacity duration-300"></div>
    
    <div id="sectionSidebar" class="fixed inset-y-0 right-0 w-full sm:w-[550px] bg-white shadow-[-10px_0_30px_rgba(0,0,0,0.1)] z-[70] transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        
        <!-- Header -->
        <div class="px-6 py-5 flex items-center justify-between bg-white border-b border-gray-100">
            <h2 id="sectionSidebarTitle" class="text-[18px] font-bold text-gray-900">Add Section</h2>
            <button onclick="window.closeSectionSidebar()" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:bg-gray-200 hover:text-gray-700 transition-colors">
                <i class="fi fi-rr-cross text-sm"></i>
            </button>
        </div>
        
        <!-- Body -->
        <div class="flex-1 overflow-y-auto p-6 space-y-5">
            <div>
                <label class="block text-[13px] font-medium text-gray-800 mb-1.5">Section Name *</label>
                <input type="text" id="sectionName" class="w-full px-4 py-2 bg-white border border-gray-300 rounded-full text-[13px] focus:outline-none focus:ring-1 focus:ring-[#FFB33F] focus:border-[#FFB33F] transition-all" placeholder="e.g. Senior">
            </div>
            <div>
                <label class="block text-[13px] font-medium text-gray-800 mb-1.5">Classes (Comma separated)</label>
                <input type="text" id="sectionClasses" class="w-full px-4 py-2 bg-white border border-gray-300 rounded-full text-[13px] focus:outline-none focus:ring-1 focus:ring-[#FFB33F] focus:border-[#FFB33F] transition-all" placeholder="e.g. 8, 9, 10">
            </div>
            <div class="flex items-center mt-2">
                <label class="relative inline-flex items-center cursor-pointer group">
                    <input type="checkbox" id="sectionActive" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-[#FFB33F]/20 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#FFB33F] shadow-inner transition-colors"></div>
                    <span class="ml-3 text-[13px] font-medium text-gray-800 group-hover:text-gray-900 transition-colors">Active Section</span>
                </label>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="p-6 bg-white flex justify-end gap-3 border-t border-gray-100">
            <button onclick="window.closeSectionSidebar()" class="flex items-center justify-center gap-2 px-5 py-2 bg-white border border-gray-300 text-gray-700 rounded-full text-[13px] font-bold hover:bg-gray-50 transition-all shadow-sm">
                <i class="fi fi-rr-cross text-xs"></i> Cancel
            </button>
            <button id="btn-save-section" onclick="window.saveSection()" class="flex items-center justify-center gap-2 px-5 py-2 bg-[#FFB33F] text-[#111827] rounded-full text-[13px] font-bold hover:bg-opacity-90 transition-all shadow-sm">
                <i class="fi fi-rr-disk text-sm"></i>
                <span id="btn-save-section-text">Save Section</span>
            </button>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <!-- Script to handle view toggling -->
    <script>
        var sectionsData = [];
        var selectedSectionIds = new Set();
        var editingSectionId = null;
        var activeSectionDropdownId = null;

        window.switchView = function(viewName) {
            const viewTable = document.getElementById('view-table');
            const viewCards = document.getElementById('view-cards');
            const btnTable = document.getElementById('btn-table');
            const btnCards = document.getElementById('btn-cards');

            const activeClassList = "bg-white shadow-sm text-[#111827] text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap";
            const inactiveClassList = "text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap";

            if (viewName === 'table') {
                viewTable.classList.remove('hidden');
                viewCards.classList.add('hidden');
                btnTable.className = activeClassList;
                btnCards.className = inactiveClassList;
            } else if (viewName === 'cards') {
                viewTable.classList.add('hidden');
                viewCards.classList.remove('hidden');
                btnTable.className = inactiveClassList;
                btnCards.className = activeClassList;
            }
        }

        function getUncheckedIcon(id) {
            return `<div onclick="toggleSectionSelection('${id}', event)" class="w-5 h-5 rounded-full border-2 border-gray-200 hover:border-[#FFC107] bg-white cursor-pointer transition-colors"></div>`;
        }
        function getCheckedIcon(id) {
            return `<div onclick="toggleSectionSelection('${id}', event)" class="w-5 h-5 rounded-full flex items-center justify-center bg-[#FFC107] cursor-pointer hover:scale-105 transition-transform">
                        <i class="fi fi-rr-check text-[10px] text-white"></i>
                    </div>`;
        }

        function getActionMenu(id) {
            return `
                <div class="relative inline-block text-left menu-container">
                    <button onclick="openActionMenu('${id}', event)" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-gray-400 hover:text-gray-800">
                        <i class="fi fi-rr-menu-dots-vertical text-xs"></i>
                    </button>
                </div>`;
        }

        // FILTERING & SEARCH LOGIC
        var sectionSearchQuery = '';
        
        function applySectionFilters() {
            sectionSearchQuery = document.getElementById('search-sections').value.toLowerCase().trim();
            renderSectionsUI();
        }

        function getFilteredSections() {
            if (!sectionSearchQuery) return sectionsData;
            return sectionsData.filter(s => 
                (s.name && s.name.toLowerCase().includes(sectionSearchQuery))
            );
        }

        function renderSectionsUI() {
            const tableList = document.getElementById('section-table-list');
            const cardsList = document.getElementById('section-cards-list');
            const stdHeader = document.getElementById('standard-header');
            const blkHeader = document.getElementById('bulk-header');
            
            const filteredData = getFilteredSections();
            document.getElementById('results-count').innerText = `Showing 1 to ${filteredData.length} of ${filteredData.length} results`;

            if(selectedSectionIds.size > 0) {
                stdHeader.classList.add('hidden');
                blkHeader.classList.remove('hidden');
                document.getElementById('selected-count-text').innerText = selectedSectionIds.size;
            } else {
                stdHeader.classList.remove('hidden');
                blkHeader.classList.add('hidden');
                document.getElementById('master-checkbox').outerHTML = `<div onclick="toggleAllSections(event)" class="w-5 h-5 rounded-full border-2 border-gray-200 hover:border-[#FFC107] cursor-pointer transition-colors" id="master-checkbox"></div>`;
            }

            if (filteredData.length === 0) {
                tableList.innerHTML = `<div class="flex justify-center items-center py-20"><p class="text-[13px] text-gray-500 font-medium">No sections found</p></div>`;
                cardsList.innerHTML = `<div class="flex justify-center items-center py-14 col-span-full"><p class="text-[13px] text-gray-500 font-medium">No sections found</p></div>`;
                return;
            }

            let tableHTML = '';
            let cardsHTML = '';

            filteredData.forEach(d => {
                const isSelected = selectedSectionIds.has(d.id);
                const cardBorder = isSelected ? 'border-2 border-[#FFC107]' : 'border border-gray-200';
                const rowBg = isSelected ? 'bg-blue-50/20' : 'bg-white hover:bg-gray-50';
                const activeHtml = d.isActive ? `<span class="bg-[#FFB33F] text-[#111827] text-[11px] font-medium px-2.5 py-1 rounded-full inline-flex shadow-sm">Active</span>` : `<span class="bg-red-50 text-red-600 text-[11px] font-medium px-2.5 py-1 rounded-full inline-flex shadow-sm">Inactive</span>`;
                const createdDate = d.createdAt ? d.createdAt.toDate().toLocaleDateString() : 'Just now';
                const classesHtml = (d.classes && d.classes.length > 0) ? d.classes.join(', ') : '-';

                tableHTML += `
                <div class="grid grid-cols-12 gap-4 items-center py-2.5 px-6 border-b border-gray-100 ${rowBg} transition-colors group cursor-pointer" onclick="viewSection('${d.id}', event)">
                    <div class="col-span-1">${isSelected ? getCheckedIcon(d.id) : getUncheckedIcon(d.id)}</div>
                    <div class="col-span-4 text-[14px] text-gray-900 font-medium">${d.name}</div>
                    <div class="col-span-3 text-[13px] text-gray-600 truncate" title="${classesHtml}">${classesHtml}</div>
                    <div class="col-span-1 flex justify-center">${activeHtml}</div>
                    <div class="col-span-2 flex justify-center text-[12.5px] text-gray-500">${createdDate}</div>
                    <div class="col-span-1 flex justify-end">${getActionMenu(d.id)}</div>
                </div>`;

                cardsHTML += `
                <div class="bg-white ${cardBorder} rounded-xl p-4 relative shadow-sm hover:shadow-md transition-shadow min-h-[140px] flex flex-col cursor-pointer" onclick="viewSection('${d.id}', event)">
                    <div class="absolute top-4 right-4 z-10">${isSelected ? getCheckedIcon(d.id) : getUncheckedIcon(d.id)}</div>
                    <div class="flex items-center gap-3 mb-1 relative z-0 pr-8">
                        <h3 class="text-[15px] font-semibold text-gray-900 truncate">${d.name}</h3>
                    </div>
                    <p class="text-[12px] text-gray-400 mb-4 truncate" title="${classesHtml}">Classes: ${classesHtml}</p>
                    <div class="flex justify-between items-end mt-auto relative z-0">
                        ${activeHtml}
                        <span class="text-[11px] text-gray-400">${createdDate}</span>
                    </div>
                    <div class="absolute bottom-3 right-3 z-10">${getActionMenu(d.id)}</div>
                </div>`;
            });

            tableList.innerHTML = tableHTML;
            cardsList.innerHTML = cardsHTML;
        }

        window.toggleSectionSelection = function(id, event) {
            event.stopPropagation();
            if (selectedSectionIds.has(id)) selectedSectionIds.delete(id);
            else selectedSectionIds.add(id);
            renderSectionsUI();
        };

        window.toggleAllSections = function(event) {
            if(event) event.stopPropagation();
            const filteredData = getFilteredSections();
            if (selectedSectionIds.size === filteredData.length && filteredData.length > 0) selectedSectionIds.clear();
            else filteredData.forEach(c => selectedSectionIds.add(c.id));
            renderSectionsUI();
        };

        window.deleteSelectedSections = function() {
            if(confirm(`Are you sure you want to delete ${selectedSectionIds.size} sections?`)) {
                const batch = db.batch();
                selectedSectionIds.forEach(id => batch.delete(db.collection('sections').doc(id)));
                batch.commit().then(() => {
                    selectedSectionIds.clear();
                    typeof showToast === 'function' && showToast("✅ Sections deleted!");
                });
            }
        };

        window.deleteSingleSection = function(id, event) {
            event.stopPropagation();
            if(confirm(`Delete this section?`)) {
                db.collection('sections').doc(id).delete().then(() => {
                    selectedSectionIds.delete(id);
                    activeSectionDropdownId = null;
                    typeof showToast === 'function' && showToast("✅ Section deleted!");
                });
            }
        };

        window.openActionMenu = function(id, event) {
            event.stopPropagation();
            if (activeSectionDropdownId === id) {
                closeAllDropdowns();
                return;
            }
            activeSectionDropdownId = id;
            
            const btn = event.currentTarget;
            const rect = btn.getBoundingClientRect();
            const menu = document.getElementById('global-action-menu');
            
            menu.classList.remove('hidden');
            
            const menuHeight = menu.offsetHeight;
            let topPos = rect.bottom + 4;
            if (topPos + menuHeight > window.innerHeight) {
                topPos = rect.top - menuHeight - 4;
            }
            
            menu.style.top = topPos + 'px';
            menu.style.left = (rect.right - 144) + 'px';
            
            document.getElementById('btn-view').onclick = (e) => { window.sectionCloseDropdowns(); viewSection(id, e); };
            document.getElementById('btn-edit').onclick = (e) => { window.sectionCloseDropdowns(); editSection(id, e); };
            document.getElementById('btn-delete').onclick = (e) => { window.sectionCloseDropdowns(); deleteSingleSection(id, e); };
        };

        if (window.sectionCloseDropdowns) {
            document.removeEventListener('click', window.sectionCloseDropdowns);
            window.removeEventListener('scroll', window.sectionCloseDropdowns, true);
        }

        window.sectionCloseDropdowns = function(event) {
            const menu = document.getElementById('global-action-menu');
            if (event && event.type === 'click' && menu && menu.contains(event.target)) return;
            activeSectionDropdownId = null;
            if (menu) menu.classList.add('hidden');
        };

        document.addEventListener('click', window.sectionCloseDropdowns);
        window.addEventListener('scroll', window.sectionCloseDropdowns, true);

        // --- View Section Dashboard Logic ---
        window.viewSection = function(id, event) {
            if(event) event.stopPropagation(); // Prevent row click from firing twice if menu is clicked
            const section = sectionsData.find(s => s.id === id);
            if(!section) return;
            localStorage.setItem('viewSectionId', id);
            localStorage.setItem('viewSectionName', section.name);
            if (typeof loadModule === 'function') loadModule('viewSectionData');
        };

        // --- Sidebar Logic ---
        window.openSectionSidebar = function() {
            editingSectionId = null;
            document.getElementById('sectionSidebarTitle').innerText = "Add Section";
            document.getElementById('btn-save-section-text').innerText = "Save Section";
            document.getElementById('sectionName').value = '';
            document.getElementById('sectionClasses').value = '';
            document.getElementById('sectionActive').checked = true;
            document.getElementById('sectionOverlay').classList.remove('hidden');
            document.getElementById('sectionSidebar').classList.remove('translate-x-full');
            setTimeout(() => document.getElementById('sectionName').focus(), 320);
        };

        window.editSection = function(id, event) {
            event.stopPropagation();
            const section = sectionsData.find(s => s.id === id);
            if(!section) return;
            editingSectionId = id;
            activeSectionDropdownId = null;
            document.getElementById('sectionSidebarTitle').innerText = "Edit Section";
            document.getElementById('btn-save-section-text').innerText = "Update Section";
            document.getElementById('sectionName').value = section.name;
            document.getElementById('sectionClasses').value = (section.classes || []).join(', ');
            document.getElementById('sectionActive').checked = section.isActive;
            document.getElementById('sectionOverlay').classList.remove('hidden');
            document.getElementById('sectionSidebar').classList.remove('translate-x-full');
        };

        window.closeSectionSidebar = function() {
            document.getElementById('sectionOverlay').classList.add('hidden');
            document.getElementById('sectionSidebar').classList.add('translate-x-full');
        };

        window.saveSection = function() {
            const name = document.getElementById('sectionName').value.trim();
            const classesInput = document.getElementById('sectionClasses').value.trim();
            const classesArray = classesInput ? classesInput.split(',').map(s => s.trim()).filter(s => s) : [];
            const isActive = document.getElementById('sectionActive').checked;
            if(!name) return showToast("❌ Section Name is required!");
            
            const payload = { name, classes: classesArray, isActive };
            if (typeof firebase !== 'undefined' && firebase.firestore) {
                payload.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
            }

            if(editingSectionId) {
                db.collection('sections').doc(editingSectionId).update(payload).then(() => {
                    window.closeSectionSidebar();
                    typeof showToast === 'function' && showToast("✅ Section updated successfully!");
                }).catch(e => typeof showToast === 'function' && showToast("❌ Error: " + e.message));
            } else {
                if (typeof firebase !== 'undefined' && firebase.firestore) {
                    payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                }
                db.collection('sections').add(payload).then(() => {
                    window.closeSectionSidebar();
                    typeof showToast === 'function' && showToast("✅ Section added successfully!");
                }).catch(e => typeof showToast === 'function' && showToast("❌ Error: " + e.message));
            }
        };

        // --- Real-Time Listener ---
        if(window.sectionUnsub) window.sectionUnsub();
        if(typeof db !== 'undefined') {
            window.sectionUnsub = db.collection('sections').orderBy('createdAt', 'desc').onSnapshot(snap => {
                sectionsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderSectionsUI();
            });
        }
    </script>
</body>
</html>
