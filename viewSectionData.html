<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section Overview Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { bg: '#f8f9fc', border: '#e5e7eb', textMuted: '#6b7280', textDark: '#111827', blue: '#134E8E', yellow: '#FFB33F' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        i[class^="fi-"] { display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-brand-bg font-sans min-h-screen p-4 sm:p-6 md:p-8">

    <div class="max-w-[1400px] w-full mx-auto">
        <!-- Header Section -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-4">
                <button onclick="if(typeof loadModule === 'function') loadModule('addSection')" class="w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors shadow-sm shrink-0">
                    <i class="fi fi-rr-arrow-left"></i>
                </button>
                <div class="hidden sm:flex bg-yellow-50 w-12 h-12 rounded-xl border border-yellow-100 items-center justify-center shadow-sm shrink-0">
                    <i class="fi fi-rr-chart-histogram text-2xl text-yellow-500"></i>
                </div>
                <div>
                    <div class="flex items-center gap-3">
                        <h1 class="text-xl sm:text-[22px] font-semibold text-gray-900 leading-tight">
                            <span id="vsd-section-name">Section</span> <span class="text-gray-400 font-normal">Overview</span>
                        </h1>
                    </div>
                    <p class="text-[12px] sm:text-[13px] text-gray-500 mt-0.5 sm:mt-1">Section analytics and associated data</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span id="vsd-section-status" class="px-3 py-1.5 bg-[#FFB33F] text-[#111827] rounded-full text-[11px] font-bold shadow-sm">ACTIVE</span>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.02)] flex flex-col justify-between">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Total Candidates</span>
                    <div class="w-8 h-8 rounded-full bg-blue-50/80 text-blue-500 flex items-center justify-center shrink-0"><i class="fi fi-rr-users text-sm"></i></div>
                </div>
                <div>
                    <div id="vsd-stat-candidates" class="text-3xl font-black text-gray-900 mb-0.5 leading-none">0</div>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.02)] flex flex-col justify-between">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Total Programs</span>
                    <div class="w-8 h-8 rounded-full bg-green-50/80 text-green-500 flex items-center justify-center shrink-0"><i class="fi fi-rr-book-alt text-sm"></i></div>
                </div>
                <div>
                    <div id="vsd-stat-programs" class="text-3xl font-black text-gray-900 mb-0.5 leading-none">0</div>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.02)] flex flex-col justify-between">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Results Published</span>
                    <div class="w-8 h-8 rounded-full bg-teal-50/80 text-teal-600 flex items-center justify-center shrink-0"><i class="fi fi-rr-check-circle text-sm"></i></div>
                </div>
                <div>
                    <div id="vsd-stat-published" class="text-3xl font-black text-gray-900 mb-0.5 leading-none">0</div>
                </div>
            </div>
            <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.02)] flex flex-col justify-between">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Results Pending</span>
                    <div class="w-8 h-8 rounded-full bg-orange-50/80 text-orange-500 flex items-center justify-center shrink-0"><i class="fi fi-rr-clock text-sm"></i></div>
                </div>
                <div>
                    <div id="vsd-stat-pending" class="text-3xl font-black text-gray-900 mb-0.5 leading-none">0</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-[1.5fr_1fr] xl:grid-cols-[2fr_1fr] gap-6">
            <!-- Left Area: Toggles and Table -->
            <div class="flex flex-col space-y-4">
                <!-- Toggles -->
                <div class="flex bg-gray-100/80 p-1 rounded-lg items-center w-full sm:w-auto overflow-x-auto no-scrollbar border border-gray-200/60 inline-flex">
                    <button id="tab-candidates" class="tab-btn bg-white shadow-sm text-[#111827] text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap active" data-target="content-candidates">
                        <i class="fi fi-rr-users text-xs shrink-0"></i> Candidates
                    </button>
                    <button id="tab-programs" class="tab-btn text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap" data-target="content-programs">
                        <i class="fi fi-rr-trophy text-xs shrink-0"></i> Programs
                    </button>
                </div>

                <!-- Table Container -->
                <div class="bg-white rounded-xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] overflow-hidden flex-grow flex flex-col">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 border-b border-gray-100 gap-4 sm:gap-0">
                        <h3 class="text-[15px] font-bold text-gray-900" id="table-title">Section Candidates</h3>
                        <div class="relative w-full sm:w-64">
                            <i class="fi fi-rr-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                            <input type="text" id="vsd-search" placeholder="Search..." 
                                class="w-full pl-8 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-full text-[13px] focus:outline-none focus:ring-2 focus:ring-[#FFB33F]/30 focus:border-[#FFB33F] transition-all">
                        </div>
                    </div>

                    <!-- Table Area -->
                    <div id="content-candidates" class="overflow-x-auto w-full flex-grow block">
                        <div class="w-full min-w-[600px]">
                            <div class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-[#FAFAFA]">
                                <div class="col-span-2 text-[13px] font-medium text-gray-700">Chest No</div>
                                <div class="col-span-5 text-[13px] font-medium text-gray-700">Candidate Name</div>
                                <div class="col-span-3 text-[13px] font-medium text-gray-700">Team</div>
                                <div class="col-span-2 text-[13px] font-medium text-gray-700 text-center">Status</div>
                            </div>
                            <div id="vsd-candidates-list">
                                <div class="py-16 text-center text-[13px] text-gray-400">Loading candidates...</div>
                            </div>
                        </div>
                    </div>

                    <div id="content-programs" class="overflow-x-auto w-full flex-grow hidden">
                        <div class="w-full min-w-[600px]">
                            <div class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-[#FAFAFA]">
                                <div class="col-span-2 text-[13px] font-medium text-gray-700">Code</div>
                                <div class="col-span-5 text-[13px] font-medium text-gray-700">Program Name</div>
                                <div class="col-span-3 text-[13px] font-medium text-gray-700">Type</div>
                                <div class="col-span-2 text-[13px] font-medium text-gray-700 text-center">Status</div>
                            </div>
                            <div id="vsd-programs-list">
                                <div class="py-16 text-center text-[13px] text-gray-400">Loading programs...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Area: Top Performers Sidebar -->
            <div class="bg-white rounded-xl shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-gray-200 p-6 flex flex-col min-h-[400px]">
                <div class="flex items-center gap-2 mb-6">
                    <i class="fi fi-rr-medal text-gray-400 text-lg"></i>
                    <h3 class="text-[12px] font-bold text-gray-500 tracking-widest uppercase mt-0.5">Top Performers</h3>
                </div>
                
                <div class="flex-grow flex flex-col items-center justify-center text-gray-400">
                    <i class="fi fi-rr-medal text-4xl mb-3 text-gray-200"></i>
                    <p class="text-[13px] font-medium text-gray-400">No toppers yet</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Auto-update breadcrumbs and title from localStorage
            var secName = localStorage.getItem('viewSectionName') || 'Section';
            var secId = localStorage.getItem('viewSectionId');
            document.getElementById('vsd-section-name').innerText = secName;
            
            var crumb = document.getElementById('breadcrumb-current');
            if (crumb) crumb.innerText = secName;

            // Fetch section status dynamically
            if (typeof db !== 'undefined' && secId) {
                // Watch Section Data
                if (window.vsdSecUnsub) window.vsdSecUnsub();
                window.vsdSecUnsub = db.collection('sections').doc(secId).onSnapshot(doc => {
                    if (doc.exists) {
                        const isActive = doc.data().isActive !== false;
                        const statEl = document.getElementById('vsd-section-status');
                        if (statEl) {
                            statEl.innerText = isActive ? 'ACTIVE' : 'INACTIVE';
                            statEl.className = isActive ? 'px-3 py-1.5 bg-[#FFB33F] text-[#111827] rounded-full text-[11px] font-bold shadow-sm' : 'px-3 py-1.5 bg-red-50 text-red-600 rounded-full text-[11px] font-bold shadow-sm';
                        }
                    }
                });

                let sectionCandidatesData = [];
                let sectionProgramsData = [];

                // Rendering Logic
                window.renderVsdCandidates = function() {
                    const list = document.getElementById('vsd-candidates-list');
                    if(!list) return;
                    const query = (document.getElementById('vsd-search').value || '').toLowerCase();
                    const filtered = sectionCandidatesData.filter(c => 
                        (c.name && c.name.toLowerCase().includes(query)) ||
                        (c.chestNo && String(c.chestNo).toLowerCase().includes(query)) ||
                        (c.team && c.team.toLowerCase().includes(query))
                    );

                    if (filtered.length === 0) {
                        list.innerHTML = `<div class="py-16 text-center text-[13px] text-gray-400">No candidates found</div>`;
                        return;
                    }

                    list.innerHTML = filtered.map(c => {
                        const statusHTML = c.active !== false 
                            ? `<span class="px-2.5 py-1 bg-[#FFB33F] text-[#111827] rounded-full text-[10px] font-bold shadow-sm">ACTIVE</span>` 
                            : `<span class="px-2.5 py-1 bg-red-50 text-red-500 rounded-full text-[10px] font-bold shadow-sm">INACTIVE</span>`;
                        
                        return `
                        <div class="grid grid-cols-12 gap-4 items-center py-2.5 px-6 border-b border-gray-100 bg-white hover:bg-gray-50 transition-colors">
                            <div class="col-span-2 font-bold text-[13px] text-gray-900">#${c.chestNo || '?'}</div>
                            <div class="col-span-5 flex flex-col">
                                <span class="text-[14px] font-medium text-gray-900">${c.name || '—'}</span>
                                <span class="text-[12px] text-gray-400">Adm: ${c.admissionNo || 'N/A'}</span>
                            </div>
                            <div class="col-span-3 text-[13px] text-gray-600 font-medium">${c.team || '—'}</div>
                            <div class="col-span-2 flex justify-center">${statusHTML}</div>
                        </div>`;
                    }).join('');
                };

                window.renderVsdPrograms = function() {
                    const list = document.getElementById('vsd-programs-list');
                    if(!list) return;
                    const query = (document.getElementById('vsd-search').value || '').toLowerCase();
                    const filtered = sectionProgramsData.filter(p => 
                        (p.name && p.name.toLowerCase().includes(query)) ||
                        (p.code && p.code.toLowerCase().includes(query)) ||
                        (p.type && p.type.toLowerCase().includes(query))
                    );

                    if (filtered.length === 0) {
                        list.innerHTML = `<div class="py-16 text-center text-[13px] text-gray-400">No programs found</div>`;
                        return;
                    }

                    list.innerHTML = filtered.map(p => {
                        const statusHTML = p.status !== false 
                            ? `<span class="px-2.5 py-1 bg-[#FFB33F] text-[#111827] rounded-full text-[10px] font-bold shadow-sm">ACTIVE</span>` 
                            : `<span class="px-2.5 py-1 bg-red-50 text-red-500 rounded-full text-[10px] font-bold shadow-sm">INACTIVE</span>`;
                        
                        return `
                        <div class="grid grid-cols-12 gap-4 items-center py-2.5 px-6 border-b border-gray-100 bg-white hover:bg-gray-50 transition-colors">
                            <div class="col-span-2 text-[12.5px] font-mono-custom text-gray-600">${p.code || '—'}</div>
                            <div class="col-span-5 text-[14px] font-medium text-gray-900">${p.name || '—'}</div>
                            <div class="col-span-3 text-[13px] text-gray-600 font-medium">${p.type || '—'}</div>
                            <div class="col-span-2 flex justify-center">${statusHTML}</div>
                        </div>`;
                    }).join('');
                };

                // Set up search bar logic
                document.getElementById('vsd-search').addEventListener('input', () => {
                    if (document.getElementById('content-candidates').classList.contains('block')) {
                        renderVsdCandidates();
                    } else {
                        renderVsdPrograms();
                    }
                });

                // Watch Candidates
                if(window.vsdCandUnsub) window.vsdCandUnsub();
                window.vsdCandUnsub = db.collection('candidates').where('section', '==', secName).onSnapshot(snap => {
                    document.getElementById('vsd-stat-candidates').innerText = snap.size;
                    sectionCandidatesData = snap.docs.map(d => d.data());
                    if (document.getElementById('content-candidates').classList.contains('block')) renderVsdCandidates();
                });

                // Watch Programs
                if(window.vsdProgUnsub) window.vsdProgUnsub();
                window.vsdProgUnsub = db.collection('programs').where('section', '==', secName).onSnapshot(snap => {
                    document.getElementById('vsd-stat-programs').innerText = snap.size;
                    sectionProgramsData = snap.docs.map(d => d.data());
                    if (document.getElementById('content-programs').classList.contains('block')) renderVsdPrograms();
                });
            }

            // Tab Switching Logic
            const contentCandidates = document.getElementById('content-candidates');
            const contentPrograms = document.getElementById('content-programs');
            const tableTitle = document.getElementById('table-title');

            const activeClasses = ['bg-white', 'shadow-sm', 'text-[#111827]', 'font-semibold'];
            const inactiveClasses = ['text-gray-500', 'hover:text-gray-800', 'bg-transparent', 'font-medium'];

            function switchTab(activeTab, inactiveTab, showContent, hideContent) {
                activeClasses.forEach(cls => activeTab.classList.add(cls));
                inactiveClasses.forEach(cls => activeTab.classList.remove(cls));
                
                activeClasses.forEach(cls => inactiveTab.classList.remove(cls));
                inactiveClasses.forEach(cls => inactiveTab.classList.add(cls));

                showContent.classList.remove('hidden');
                showContent.classList.add('block');
                hideContent.classList.add('hidden');
                hideContent.classList.remove('block');
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.currentTarget.getAttribute('data-target');
                    const isCand = targetId === 'content-candidates';
                    switchTab(e.currentTarget, document.getElementById(isCand ? 'tab-programs' : 'tab-candidates'), 
                              document.getElementById(targetId), document.getElementById(isCand ? 'content-programs' : 'content-candidates'));
                    tableTitle.innerText = isCand ? "Section Candidates" : "Section Programs";
                    if(isCand && window.renderVsdCandidates) window.renderVsdCandidates();
                    if(!isCand && window.renderVsdPrograms) window.renderVsdPrograms();
                });
            });
        })();
    </script>
</body>
</html>
