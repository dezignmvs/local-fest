<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#134E8E',
                            orange: '#FF4400',
                            yellow: '#FFB33F',
                            textDark: '#111827'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100/50 text-gray-800 font-sans p-4 md:p-8 min-h-screen flex justify-center relative">

    <div class="w-full max-w-7xl">
        <!-- Header Section -->
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-gray-900 leading-tight">Program Registrations</h1>
                <p class="text-gray-500 text-sm mt-1">View candidates registered for every program</p>
            </div>
        </div>

        <!-- Main Card Container -->
        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden flex flex-col min-h-[500px]">
            
            <!-- Toolbar -->
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                
                <!-- View Toggles -->
                <div class="inline-flex items-center rounded-xl bg-gray-100 p-1 border border-gray-200 shadow-inner">
                    <button id="btn-table" onclick="switchRegView('table')" class="flex items-center justify-center gap-2 px-4 py-1.5 rounded-lg text-sm font-bold transition-all bg-white text-gray-900 shadow shadow-black/5">
                        <i class="fi fi-rr-table-list mt-0.5"></i>
                        <span class="hidden sm:inline">Table</span>
                    </button>
                    <button id="btn-cards" onclick="switchRegView('cards')" class="flex items-center justify-center gap-2 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all text-gray-500 hover:text-gray-800">
                        <i class="fi fi-rr-grid mt-0.5"></i>
                        <span class="hidden sm:inline">Cards</span>
                    </button>
                </div>
            </div>

            <!-- Content Area - Table View -->
            <div id="view-table" class="block w-full overflow-x-auto no-scrollbar flex-1">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead class="bg-white text-sm border-b border-gray-200 sticky top-0 z-10">
                        <tr>
                            <th class="px-6 py-4 font-bold text-gray-800 w-1/2 uppercase tracking-wide text-xs">Program Details</th>
                            <th class="px-6 py-4 font-bold text-gray-800 w-1/2 uppercase tracking-wide text-xs">Status & Registrations</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Injected Rows -->
                        <tr><td colspan="2" class="p-10 text-center text-gray-400">Loading programs...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Content Area - Cards View -->
            <div id="view-cards" class="hidden p-6 bg-gray-50/50 w-full flex-1">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                    <!-- Injected Cards -->
                    <div class="col-span-full p-10 text-center text-gray-400">Loading programs...</div>
                </div>
            </div>

            <!-- Footer / Pagination -->
            <div class="p-4 border-t border-gray-100 flex justify-between items-center text-sm text-gray-500 bg-white">
                <div class="flex items-center gap-2" id="results-count">
                    Showing 0 results
                </div>
            </div>

        </div>
    </div>


    <!-- View Toggling Logic -->
    <script>
        window.switchRegView = function(viewMode) {
            const btnTable = document.getElementById('btn-table');
            const btnCards = document.getElementById('btn-cards');
            const viewTable = document.getElementById('view-table');
            const viewCards = document.getElementById('view-cards');
            if (!btnTable || !btnCards || !viewTable || !viewCards) return;

            const activeClasses = ['bg-white', 'text-gray-900', 'font-bold', 'shadow', 'shadow-black/5'];
            const inactiveClasses = ['text-gray-500', 'font-semibold', 'hover:text-gray-800'];

            if (viewMode === 'table') {
                viewTable.classList.remove('hidden');
                viewCards.classList.add('hidden');
                
                btnTable.classList.add(...activeClasses);
                btnTable.classList.remove(...inactiveClasses);
                btnCards.classList.add(...inactiveClasses);
                btnCards.classList.remove(...activeClasses);
            } else {
                viewCards.classList.remove('hidden');
                viewTable.classList.add('hidden');
                
                btnCards.classList.add(...activeClasses);
                btnCards.classList.remove(...inactiveClasses);
                btnTable.classList.add(...inactiveClasses);
                btnTable.classList.remove(...activeClasses);
            }
        };
    </script>
    <script>
        var allPrograms = [];
        var allRegistrations = [];
        var allCandidates = [];

        function initRegistrations() {
            if(typeof db === 'undefined') {
                if(window.db) window.db = db;
                else return;
            }
            
            // Initial render call to show loading properly
            renderProgramsAndRegs();
            
            // Fetch candidates first to get names
            db.collection('candidates').get().then(snap => {
                allCandidates = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                
                // Listen to programs
                db.collection('programs').orderBy('name').onSnapshot(progSnap => {
                    allPrograms = progSnap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    
                    // Listen to registrations
                    db.collection('registrations').onSnapshot(regSnap => {
                        allRegistrations = regSnap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                        renderProgramsAndRegs();
                    });
                });
            });
        }

        function renderProgramsAndRegs() {
            const tbody = document.querySelector('#view-table tbody');
            const cardsGrid = document.querySelector('#view-cards .grid');
            
            if(!tbody || !cardsGrid) return;

            let tableHTML = '';
            let cardsHTML = '';

            document.getElementById('results-count').innerText = `Showing ${allPrograms.length} programs`;

            allPrograms.forEach(prog => {
                // Find registrations for this program
                const regs = allRegistrations.filter(r => r.programId === prog.id);
                const totalRegs = regs.length; // number of teams registered
                const candidateCount = regs.reduce((sum, r) => sum + (r.chestNumbers ? r.chestNumbers.length : 0), 0);

                // Calculate colors/badges based on type/section
                const typeBadge = prog.type === 'Group' ? 'bg-[#3182ce] text-white' : 'bg-white border-gray-200 text-gray-700 font-bold shadow-sm';

                let inlineCandsHTML = '';
                if (regs.length === 0) {
                    inlineCandsHTML = `<div class="text-[12px] text-gray-400 italic py-4 text-center w-full">No candidates registered</div>`;
                } else {
                    regs.forEach(reg => {
                        const teamName = reg.team || 'Unknown Team';
                        let teamCands = '';
                        if (reg.chestNumbers && reg.chestNumbers.length > 0) {
                            reg.chestNumbers.forEach(chest => {
                                const cand = allCandidates.find(c => c.chestNo === chest && c.team === reg.team);
                                const cName = cand ? cand.name : 'Unknown Candidate';
                                teamCands += `
                                    <div class="flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0">
                                        <div class="flex items-center gap-2 overflow-hidden pr-2">
                                            <div class="w-1.5 h-1.5 rounded-full bg-brand-blue/40 shrink-0"></div>
                                            <span class="text-[12px] font-medium text-gray-800 truncate">${cName}</span>
                                        </div>
                                        <span class="text-[10px] font-mono-custom font-bold text-brand-blue bg-blue-50 border border-blue-100 px-1.5 py-0.5 rounded shadow-sm shrink-0">${chest}</span>
                                    </div>
                                `;
                            });
                        }
                        
                        inlineCandsHTML += `
                        <div class="mb-3 last:mb-0">
                            <div class="text-[10px] font-bold text-brand-orange uppercase tracking-wider mb-1.5 flex items-center gap-1.5"><i class="fi fi-rr-users text-[10px]"></i> ${teamName}</div>
                            <div class="bg-white rounded-lg p-2.5 border border-gray-200 shadow-sm">${teamCands || '<span class="text-[11px] text-gray-400 italic">No candidates</span>'}</div>
                        </div>`;
                    });
                }

                // Table Row
                tableHTML += `
                <tr class="border-b border-gray-100/80 group hover:bg-gray-50/70 transition-colors">
                    <td class="px-6 py-5 align-top w-1/3">
                        <div class="flex flex-col gap-1.5">
                            <span class="text-[16px] font-bold text-gray-900 leading-snug cursor-pointer hover:text-brand-blue transition-colors" onclick="viewProgramFromReg('${prog.id}', '${prog.name.replace(/'/g, "\\'")}')">${prog.name}</span>
                            <span class="text-gray-400 text-[12px] font-mono-custom uppercase tracking-wide">#${prog.code}</span>
                            <div class="flex flex-wrap gap-2 mt-2">
                                <span class="px-3 py-1 text-[11px] rounded-full filter border ${typeBadge} uppercase tracking-widest">${prog.type || 'N/A'}</span>
                                <span class="px-3 py-1 text-[11px] font-bold rounded-full border border-gray-200 bg-gray-100 text-gray-600 uppercase tracking-widest">${prog.section || 'N/A'}</span>
                            </div>
                            ${candidateCount > 0 ? 
                                `<div class="mt-4 flex flex-col">
                                    <span class="text-[13px] font-bold text-gray-900">${candidateCount} Candidates</span>
                                    <span class="text-[11px] font-semibold text-gray-400">across ${totalRegs} Teams</span>
                                 </div>` : 
                                '<span class="text-[13px] text-gray-400 font-medium italic mt-4">No registrations</span>'}
                        </div>
                    </td>
                    <td class="px-6 py-5 align-top">
                        <div class="max-h-[250px] overflow-y-auto custom-scrollbar bg-gray-50/50 border border-gray-100 rounded-xl p-3 shadow-inner">
                            ${inlineCandsHTML}
                        </div>
                    </td>
                </tr>`;

                // Card
                cardsHTML += `
                <div class="bg-white border border-gray-200/80 rounded-[1.25rem] p-6 flex flex-col gap-4 shadow-[0_2px_12px_-4px_rgba(0,0,0,0.05)] hover:shadow-lg transition-all hover:-translate-y-1">
                    <div class="flex flex-col gap-1 relative">
                        <span class="text-[11px] font-mono-custom font-bold text-gray-400 uppercase tracking-wider bg-gray-50 border border-gray-100 px-2 py-0.5 rounded inline-block w-max mb-1">#${prog.code}</span>
                        <h3 class="font-bold text-gray-900 text-[16px] leading-tight pr-4 cursor-pointer hover:text-brand-blue transition-colors" onclick="viewProgramFromReg('${prog.id}', '${prog.name.replace(/'/g, "\\'")}')">${prog.name}</h3>
                    </div>
                    
                    <div class="flex flex-wrap gap-2 pt-1 border-t border-gray-50 border-dashed mt-1 pb-1">
                        <span class="px-3 py-0.5 text-[10px] font-bold rounded filter border ${typeBadge} uppercase tracking-widest flex items-center gap-1.5"><i class="fi fi-rr-${prog.type === 'Group' ? 'users' : 'user'}"></i> ${prog.type || 'N/A'}</span>
                        <span class="px-3 py-0.5 text-[10px] font-bold rounded border border-gray-200 bg-gray-50 text-gray-600 uppercase tracking-widest">${prog.section || 'N/A'}</span>
                    </div>
                    
                    <div class="text-[11px] text-purple-600 flex items-center gap-2 font-bold bg-purple-50/80 border border-purple-100 px-3 py-1.5 rounded-lg self-start">
                        <i class="fi fi-rr-users-alt"></i>
                        Size: Min ${prog.minParticipants || 1} &ndash; Max ${prog.maxParticipants || 1}
                    </div>
                    
                    <div class="flex-1 mt-3 max-h-[200px] overflow-y-auto custom-scrollbar border border-gray-100 rounded-xl p-3 bg-gray-50/80 shadow-inner">
                        ${inlineCandsHTML}
                    </div>
                </div>`;
            });

            tbody.innerHTML = tableHTML || '<tr><td colspan="2" class="p-12 text-center"><i class="fi fi-rr-box-open text-4xl text-gray-300 mb-3 block"></i><span class="text-gray-500 font-bold uppercase tracking-widest text-[13px]">No programs found</span></td></tr>';
            cardsGrid.innerHTML = cardsHTML || '<div class="col-span-full p-12 text-center bg-white border border-gray-200 rounded-3xl"><i class="fi fi-rr-box-open text-4xl text-gray-300 mb-3 block"></i><span class="text-gray-500 font-bold uppercase tracking-widest text-[13px]">No programs found</span></div>';
        }

        // Call init when loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initRegistrations);
        } else {
            initRegistrations();
        }

        function viewProgramFromReg(id, name) {
            localStorage.setItem('viewProgramId', id);
            if (name) localStorage.setItem('viewProgramName', name);
            if (typeof loadModule === 'function') {
                loadModule('viewProgramData');
            } else {
                window.location.href = 'viewProgramData.html';
            }
        }
    </script>
</body>
</html>
