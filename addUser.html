<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management — Festival Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            bg: '#f8f9fc',
                            border: '#e5e7eb',
                            textMuted: '#6b7280',
                            textDark: '#111827',
                            blue: '#134E8E',
                            red: '#C00707',
                            orange: '#FF4400',
                            yellow: '#FFB33F'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        /* Dropdown animation */
        .dropdown-enter { animation: drop-in 0.15s ease-out forwards; transform-origin: top right; }
        @keyframes drop-in {
            0% { opacity: 0; transform: scale(0.95) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="bg-brand-bg font-sans text-brand-textDark antialiased min-h-screen">

    <div class="max-w-[1400px] w-full mx-auto p-4 md:p-8 pb-20">

        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-[1.35rem] font-bold text-gray-800 flex items-center gap-2">
                    <i class="fi fi-rr-users text-brand-blue"></i> Festival User Roles
                </h1>
                <p id="user-count-label" class="text-[13px] text-gray-500 mt-1">Assign and manage users with specific roles for this festival</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openAssignRole()" class="flex items-center justify-center gap-2 w-10 h-10 sm:w-auto sm:px-5 sm:py-2.5 bg-brand-blue border border-transparent rounded-full text-[13px] font-bold text-white hover:bg-opacity-90 transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 p-0">
                    <i class="fi fi-rr-add text-sm sm:text-[13px]"></i> <span class="hidden sm:block">Assign New Role</span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] overflow-hidden flex flex-col">

            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 border-b border-gray-100 gap-4 sm:gap-0">
                <div class="flex bg-gray-100/80 p-1 rounded-lg items-center w-full sm:w-auto overflow-x-auto no-scrollbar border border-gray-200/60">
                    <button id="btn-table" onclick="switchView('table')" class="bg-white shadow-sm text-[#111827] text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap">
                        <i class="fi fi-rr-table-list text-xs shrink-0"></i> Table
                    </button>
                    <button id="btn-cards" onclick="switchView('cards')" class="text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap">
                        <i class="fi fi-rr-grid text-xs shrink-0"></i> Cards
                    </button>
                </div>

                <div class="flex items-center gap-3 w-full sm:w-auto mt-3 sm:mt-0">
                    <div class="relative w-full sm:w-64">
                        <i class="fi fi-rr-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" id="search-users" oninput="applyFilters()" placeholder="Search users by name or role..." 
                            class="w-full pl-8 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-full text-[13px] focus:outline-none focus:ring-2 focus:ring-brand-blue/30 focus:border-brand-blue transition-all placeholder-gray-400">
                    </div>
                </div>
            </div>

            <div id="view-table">
                <div class="overflow-x-auto w-full"> 
                    <div class="w-full min-w-[800px]">
                        <div class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-[#FAFAFA]">
                            <div class="col-span-4 text-[13px] font-medium text-gray-700">User</div>
                            <div class="col-span-3 text-[13px] font-medium text-gray-700">Role</div>
                            <div class="col-span-2 text-[13px] font-medium text-gray-700 text-center">Status</div>
                            <div class="col-span-2 text-[13px] font-medium text-gray-700">Assigned</div>
                            <div class="col-span-1 text-[13px] font-medium text-gray-700 text-right">Actions</div>
                        </div>
                        <div id="table-body" class="min-h-[350px]"></div>
                    </div>
                </div>
            </div>

            <div id="view-cards" style="display: none;" class="p-6 bg-gray-50/30 min-h-[400px]">
                <div id="cards-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                    </div>
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center py-3 px-4 sm:px-6 bg-white border-t border-gray-100 text-[13px] text-gray-600">
                <div class="flex items-center space-x-2 sm:space-x-3 mb-3 sm:mb-0">
                    <span id="pagination-label">Showing 0 results</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Action Menu -->
    <div id="global-action-menu" class="hidden fixed w-48 bg-white rounded-xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.15)] border border-gray-100 py-1.5 z-[100] dropdown-enter text-left overflow-hidden"></div>

    <div id="assignRoleOverlay" onclick="closeAssignRole()" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-[60] hidden transition-opacity duration-300"></div>
    <div id="assignRoleSidebar" class="fixed inset-y-0 right-0 w-[340px] bg-white shadow-2xl z-[70] transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col border-l border-gray-100">
        <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between bg-gray-50">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-full bg-brand-blue/10 flex items-center justify-center">
                    <i class="fi fi-rr-user-add text-brand-blue text-sm"></i>
                </div>
                <h2 id="assignRoleTitle" class="text-[15px] font-bold text-gray-800">Add Role</h2>
            </div>
            <button onclick="closeAssignRole()" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:bg-gray-200 hover:text-gray-700 transition-colors">
                <i class="fi fi-rr-cross text-sm"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1.5 uppercase tracking-wide">Full Name</label>
                <input type="text" id="ar-name" oninput="arAutoGenerate()" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-blue/30 focus:border-brand-blue transition-all" placeholder="e.g. Rahul Sharma">
            </div>

            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="text-xs font-bold text-gray-600 uppercase tracking-wide">Username</label>
                    <button onclick="arToggleEdit('ar-username')" class="flex items-center gap-1 text-[11px] font-medium text-brand-blue hover:opacity-70 transition-opacity">
                        <i id="ar-icon-username" class="fi fi-rr-edit text-xs"></i>
                        <span id="ar-label-username">Edit</span>
                    </button>
                </div>
                <div class="relative">
                    <input type="text" id="ar-username" readonly class="w-full px-4 py-2.5 bg-gray-100 border border-gray-200 rounded-xl text-sm text-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-blue/30 focus:border-brand-blue transition-all cursor-not-allowed" placeholder="Auto-generated">
                    <div id="ar-username-lock" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300">
                        <i class="fi fi-rr-lock text-xs"></i>
                    </div>
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="text-xs font-bold text-gray-600 uppercase tracking-wide">Password</label>
                    <button onclick="arToggleEdit('ar-password')" class="flex items-center gap-1 text-[11px] font-medium text-brand-blue hover:opacity-70 transition-opacity">
                        <i id="ar-icon-password" class="fi fi-rr-edit text-xs"></i>
                        <span id="ar-label-password">Edit</span>
                    </button>
                </div>
                <div class="relative">
                    <input type="password" id="ar-password" readonly class="w-full px-4 py-2.5 bg-gray-100 border border-gray-200 rounded-xl text-sm text-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-blue/30 focus:border-brand-blue transition-all cursor-not-allowed" placeholder="Auto-generated">
                    <div id="ar-password-lock" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300">
                        <i class="fi fi-rr-lock text-xs"></i>
                    </div>
                </div>
                <p class="text-[11px] text-gray-400 mt-1.5 flex items-center gap-1">
                    <i class="fi fi-rr-info text-xs"></i> Auto-generated. Click Edit to change.
                </p>
            </div>

            <div class="border-t border-gray-100"></div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1.5 uppercase tracking-wide">Role</label>
                <div class="relative">
                    <select id="ar-role" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-700 font-medium focus:outline-none focus:ring-2 focus:ring-brand-blue/30 focus:border-brand-blue appearance-none cursor-pointer transition-all">
                        <option value="" disabled selected>Select a role…</option>
                        <option value="Admin">Admin</option>
                        <option value="Team Manager">Team Manager</option>
                        <option value="Media">Media</option>
                    </select>
                    <i class="fi fi-rr-angle-small-down absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-sm"></i>
                </div>
                <div id="ar-role-preview" class="hidden mt-2.5 flex items-center gap-2">
                    <span class="text-[11px] text-gray-400">Preview:</span>
                    <span id="ar-role-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold"></span>
                </div>
            </div>

            <div id="ar-team-container" class="hidden">
                <label class="block text-xs font-bold text-gray-600 mb-1.5 uppercase tracking-wide">Assign Team</label>
                <div class="relative">
                    <select id="ar-team" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm text-gray-700 font-medium focus:outline-none focus:ring-2 focus:ring-brand-blue/30 focus:border-brand-blue appearance-none cursor-pointer transition-all">
                        <option value="" disabled selected>Select a team…</option>
                    </select>
                    <i class="fi fi-rr-angle-small-down absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-sm"></i>
                </div>
            </div>
        </div>

        <div class="p-5 border-t border-gray-100 bg-white space-y-2.5">
            <button id="btn-save-role" onclick="arSave()" class="w-full py-3 bg-brand-blue text-white rounded-xl text-sm font-bold hover:opacity-90 shadow-lg shadow-brand-blue/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                <i class="fi fi-rr-check text-sm"></i> Add User & Assign Role
            </button>
            <button onclick="closeAssignRole()" class="w-full py-2.5 text-gray-500 rounded-xl text-sm font-medium hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
                <i class="fi fi-rr-cross text-sm"></i>
                Cancel
            </button>
        </div>
    </div>


    <div id="permissionsOverlay" onclick="closePermissions()" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-[60] hidden transition-opacity duration-300"></div>
    <div id="permissionsSidebar" class="fixed inset-y-0 right-0 w-[340px] bg-white shadow-2xl z-[70] transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col border-l border-gray-100">
        <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between bg-gray-50">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                    <i class="fi fi-rr-key text-indigo-600 text-sm"></i>
                </div>
                <h2 class="text-[15px] font-bold text-gray-800">Permissions</h2>
            </div>
            <button onclick="closePermissions()" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:bg-gray-200 hover:text-gray-700 transition-colors">
                <i class="fi fi-rr-cross text-sm"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-4">
            <p class="text-[13px] text-gray-500 mb-2">Configure access levels for <span id="perm-user-name" class="font-bold text-gray-800"></span>.</p>

            <label class="flex items-center gap-3 p-3.5 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 hover:border-indigo-300 transition-colors group">
                <input type="checkbox" id="perm-user-mgmt" class="w-4 h-4 text-brand-blue bg-gray-100 border-gray-300 rounded focus:ring-brand-blue">
                <div class="flex flex-col">
                    <span class="text-[13px] font-bold text-gray-700 group-hover:text-indigo-700 transition-colors">User Management</span>
                    <span class="text-[11px] text-gray-400">Can add, edit, or remove users.</span>
                </div>
            </label>

            <label class="flex items-center gap-3 p-3.5 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 hover:border-indigo-300 transition-colors group">
                <input type="checkbox" id="perm-result-mgmt" class="w-4 h-4 text-brand-blue bg-gray-100 border-gray-300 rounded focus:ring-brand-blue">
                <div class="flex flex-col">
                    <span class="text-[13px] font-bold text-gray-700 group-hover:text-indigo-700 transition-colors">Result Management</span>
                    <span class="text-[11px] text-gray-400">Can publish and modify festival results.</span>
                </div>
            </label>

            <label class="flex items-center gap-3 p-3.5 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 hover:border-indigo-300 transition-colors group">
                <input type="checkbox" id="perm-semi-owner" class="w-4 h-4 text-brand-blue bg-gray-100 border-gray-300 rounded focus:ring-brand-blue">
                <div class="flex flex-col">
                    <span class="text-[13px] font-bold text-gray-700 group-hover:text-indigo-700 transition-colors">Semi-Owner</span>
                    <span class="text-[11px] text-gray-400">Has extensive administrative access.</span>
                </div>
            </label>
        </div>

        <div class="p-5 border-t border-gray-100 bg-white space-y-2.5">
            <button id="btn-save-perms" onclick="savePermissions()" class="w-full py-3 bg-brand-blue text-white rounded-xl text-sm font-bold hover:opacity-90 shadow-lg shadow-brand-blue/20 transition-all flex items-center justify-center gap-2">
                <i class="fi fi-rr-check text-sm"></i> Save Permissions
            </button>
            <button onclick="closePermissions()" class="w-full py-2.5 text-gray-500 rounded-xl text-sm font-medium hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
                <i class="fi fi-rr-cross text-sm"></i>
                Cancel
            </button>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script>
        // ── Firebase Init ──────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyCKA0k_9UgoJX_RBgEsIeNdiW2w0Okko1o",
            authDomain: "festie-s1u2h3.firebaseapp.com",
            projectId: "festie-s1u2h3",
            storageBucket: "festie-s1u2h3.firebasestorage.app",
            messagingSenderId: "794049194885",
            appId: "1:794049194885:web:8f75f0df4c15cde15eb2ec"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();
        window.db = db;

        // ── Toast System ───────────────────────────────────────────────
        function showToast(msg) {
            Toastify({ 
                text: msg, duration: 3000, gravity: "top", position: "center",
                style: { background:"#fff", color:"#333", boxShadow:"0 4px 15px -3px rgba(0,0,0,0.1)", borderRadius:"10px", border:"1px solid #eaeaea", padding:"12px 24px", fontSize:"14px", fontFamily:"'Inter',sans-serif", display: "flex", alignItems:"center", gap:"8px" },
                escapeMarkup: false 
            }).showToast();
        }

        // ── Helper functions ───────────────────────────────────────────
        function relativeTime(ts) {
            if (!ts || !ts.toMillis) return 'just now';
            const diff = Math.floor((Date.now() - ts.toMillis()) / 1000);
            if (diff < 60) return 'just now';
            if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
            if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
            return Math.floor(diff / 86400) + ' days ago';
        }

        function initial(name) {
            return name ? name.charAt(0).toUpperCase() : '?';
        }

        function roleBadge(role) {
            const map = {
                'Owner':  'bg-[#134E8E] text-white',
                'Admin':  'bg-purple-500 text-white',
                'Team Manager': 'bg-teal-500 text-white',
                'Media': 'bg-[#FF4400] text-white',
            };
            return map[role] || 'bg-gray-300 text-gray-800';
        }

        // Action menu logic centralized below

        // ── Render Templates ───────────────────────────────────────────
        function renderTableRow(user) {
            const isOwner = user.id === 'owner';
            const isActive = user.isActive !== false;

            return `
        <div class="grid grid-cols-12 gap-4 items-center py-2.5 px-6 border-b border-gray-100 bg-white hover:bg-gray-50 transition-colors group">
            <div class="col-span-4 flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-blue-50 border border-blue-100 flex items-center justify-center text-brand-blue font-bold text-sm shrink-0">
                            ${initial(user.name || user.username)}
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[13.5px] font-bold text-gray-900 leading-none">${user.name || user.username || '—'}</span>
                            <span class="text-[12px] text-gray-400 mt-1">${user.email || user.username || '—'}</span>
                        </div>
            </div>
            <div class="col-span-3 flex flex-col gap-1.5 items-start">
                        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold shadow-sm ${roleBadge(user.role || 'Owner')}">${user.role || 'Owner'}</span>
                        ${user.role === 'Team Manager' && user.team ? `<span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full border border-gray-200 leading-none">${user.team}</span>` : ''}
            </div>
            <div class="col-span-2 flex justify-center">
                    <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold ${isActive ? 'bg-[#FFB33F] text-gray-900' : 'bg-red-50 text-red-500'}">
                        ${isActive ? 'ACTIVE' : 'INACTIVE'}
                    </span>
            </div>
            <div class="col-span-2 text-[13px] text-gray-500 font-medium">${relativeTime(user.assignedAt)}</div>
            <div class="col-span-1 flex justify-end relative">
                    ${isOwner ? `<div class="w-8 h-8 rounded-full flex items-center justify-center text-gray-300 cursor-not-allowed" title="Not applicable for Owner"><i class="fi fi-rr-ban text-[15px]"></i></div>` : `
                    <div class="relative inline-block text-left menu-container">
                            <button onclick="openActionMenu('${user.id}', event)" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors text-gray-400 hover:text-gray-700 opacity-0 group-hover:opacity-100 focus:opacity-100">
                                <i class="fi fi-rr-menu-dots-vertical text-sm"></i>
                            </button>
                        </div>
                    `}
            </div>
        </div>`;
        }

        function renderCard(user) {
            const isOwner = user.id === 'owner';
            const isActive = user.isActive !== false;

            return `
            <div class="bg-white border border-gray-200 rounded-2xl p-5 flex flex-col justify-between shadow-sm hover:shadow-md hover:border-brand-blue/30 transition-all cursor-pointer relative group min-h-[140px]">
                
                ${isOwner ? '' : `
                <div class="absolute top-3 right-3 inline-block text-left z-10">
                    <button onclick="openActionMenu('${user.id}', event)" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-gray-400 opacity-0 group-hover:opacity-100 focus:opacity-100">
                        <i class="fi fi-rr-menu-dots-vertical text-xs"></i>
                    </button>
                </div>`}

                <div class="flex items-center gap-3 w-full pr-8 mb-4">
                    <div class="w-12 h-12 rounded-full bg-blue-50 border border-blue-100 flex items-center justify-center shrink-0">
                        <span class="text-brand-blue font-bold text-[16px] leading-none">${initial(user.name || user.username)}</span>
                    </div>
                    
                    <div class="flex flex-col overflow-hidden w-full">
                        <h4 class="text-[15px] font-bold text-gray-900 leading-tight truncate w-full flex items-center gap-1">
                            ${user.name || user.username || '—'}
                            ${!isActive ? '<div class="w-2 h-2 rounded-full bg-red-500 ml-1" title="Inactive"></div>' : ''}
                        </h4>
                        <p class="text-[12px] text-gray-500 truncate w-full mt-0.5">${user.email || user.username || '—'}</p>
                    </div>
                </div>

                <div class="flex items-center justify-between w-full mt-auto">
                    <div class="flex flex-col gap-1 items-start">
                        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold shadow-sm ${roleBadge(user.role || 'Owner')}">${user.role || 'Owner'}</span>
                        ${user.role === 'Team Manager' && user.team ? `<span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full border border-gray-200 leading-none">${user.team}</span>` : ''}
                    </div>
                    <span class="text-[12px] text-gray-400 font-medium">${relativeTime(user.assignedAt)}</span>
                </div>
            </div>`;
        }

        // ── Action Menu Logic ──────────────────────────────────────────
        let activeDropdownId = null;
        function openActionMenu(userId, event) {
            event.stopPropagation();
            if (activeDropdownId === userId) {
                closeAllDropdowns();
                return;
            }
            activeDropdownId = userId;
            
            const btn = event.currentTarget;
            const rect = btn.getBoundingClientRect();
            const menu = document.getElementById('global-action-menu');
            
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            const isActive = user.isActive !== false;

            const currentRole = localStorage.getItem('userRole');
            const currentIsSemiOwner = localStorage.getItem('semiOwner') === 'true';
            const canManageAll = currentRole === 'owner' || currentIsSemiOwner;
            const isMe = user.id === localStorage.getItem('festUserId');

            let html = `<button onclick="closeAllDropdowns(); openAssignRole('${userId}')" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-gray-700 hover:bg-gray-50 flex items-center gap-2.5 transition-colors"><i class="fi fi-rr-edit text-gray-400"></i> Edit Role</button>`;
            if (canManageAll && user.role === 'Admin') html += `<button onclick="closeAllDropdowns(); openPermissions('${userId}')" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-gray-700 hover:bg-gray-50 flex items-center gap-2.5 transition-colors"><i class="fi fi-rr-key text-gray-400"></i> Permissions</button>`;
            html += `<div class="border-t border-gray-100 my-1"></div>`;
            
            if (!isMe) {
                if (canManageAll) html += `<button onclick="closeAllDropdowns(); toggleUserStatus('${userId}', ${isActive})" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-gray-700 hover:bg-gray-50 flex items-center gap-2.5 transition-colors"><i class="fi ${isActive ? 'fi-rr-ban text-orange-400' : 'fi-rr-check-circle text-green-500'}"></i> ${isActive ? 'Deactivate' : 'Activate'}</button>`;
                html += `<button onclick="closeAllDropdowns(); deleteUser('${userId}')" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-red-600 hover:bg-red-50 flex items-center gap-2.5 transition-colors"><i class="fi fi-rr-trash text-red-400"></i> Delete User</button>`;
            } else html += `<div class="px-4 py-2 text-[11px] text-gray-400 italic font-medium text-center">Your Account</div>`;

            menu.innerHTML = html;
            
            menu.classList.remove('hidden');
            
            const menuHeight = menu.offsetHeight || 160;
            let topPos = rect.bottom + 4;
            if (topPos + menuHeight > window.innerHeight) topPos = rect.top - menuHeight - 4;
            
            menu.style.top = topPos + 'px';
            menu.style.left = (rect.right - 192) + 'px'; // 192px approx w-48
        }

        function closeAllDropdowns(event) {
            const menu = document.getElementById('global-action-menu');
            if (event && event.type === 'click' && menu && menu.contains(event.target)) return;
            activeDropdownId = null;
            if (menu) menu.classList.add('hidden');
        }
        document.addEventListener('click', closeAllDropdowns);
        window.addEventListener('scroll', closeAllDropdowns, true);

        // ── Real-time Listeners & State ────────────────────────────────
        let ownerUser = null;
        let festUsersList = [];
        let allUsers = [];
        let searchQuery = '';

        // Fetch active teams
        db.collection('teams').where('isActive', '==', true).onSnapshot(snap => {
            const select = document.getElementById('ar-team');
            const currentVal = select ? select.value : '';
            let optionsHTML = '<option value="" disabled selected>Select a team…</option>';
            snap.forEach(doc => {
                const team = doc.data();
                optionsHTML += `<option value="${team.name}">${team.name}</option>`;
            });
            if (select) {
                select.innerHTML = optionsHTML;
                if(currentVal) select.value = currentVal;
            }
        });

        // ── Missing Logic: Implementing Search functionality ───────────
        function applyFilters() {
            searchQuery = document.getElementById('search-users').value.toLowerCase().trim();
            renderCombine();
        }

        function getFilteredUsers() {
            if (!searchQuery) return allUsers;
            return allUsers.filter(u => 
                (u.name && u.name.toLowerCase().includes(searchQuery)) ||
                (u.username && u.username.toLowerCase().includes(searchQuery)) ||
                (u.role && u.role.toLowerCase().includes(searchQuery))
            );
        }

        function renderCombine() {
            const currentRole = localStorage.getItem('userRole');
            const currentId = localStorage.getItem('festUserId');
            const currentIsSemiOwner = localStorage.getItem('semiOwner') === 'true';

            let filteredList = [];
            if (currentRole === 'owner' || currentIsSemiOwner) {
                if (ownerUser) filteredList.push(ownerUser);
                filteredList = filteredList.concat(festUsersList);
            } else {
                const me = festUsersList.find(u => u.id === currentId);
                if (me) filteredList.push(me);
                const myUsers = festUsersList.filter(u => u.createdBy === currentId && u.id !== currentId);
                filteredList = filteredList.concat(myUsers);
            }

            allUsers = filteredList;

            const displayUsers = getFilteredUsers();
            const total = displayUsers.length;
            
            // Labels Update
            document.getElementById('user-count-label').textContent = `Assign and manage users with specific roles for this festival (${allUsers.length} total)`;
            document.getElementById('pagination-label').textContent = total > 0 ? `Showing 1 to ${total} of ${total} results` : `No users match your search.`;

            // Table Rendering
            document.getElementById('table-body').innerHTML = total 
                ? displayUsers.map(renderTableRow).join('') 
                : `<div class="text-center py-12 text-[13px] text-gray-400">No users found matching "${searchQuery}".</div>`;
                
            // Cards Rendering
            document.getElementById('cards-grid').innerHTML = total 
                ? displayUsers.map(renderCard).join('') 
                : `<div class="col-span-full text-center text-[13px] text-gray-400 py-12">No users found matching "${searchQuery}".</div>`;
        }

        // Owner Listener
        db.collection('admin').doc('credentials').onSnapshot(doc => {
            if (doc.exists) {
                const d = doc.data();
                ownerUser = {
                    id: 'owner',
                    name: d.name || d.username,
                    username: d.username,
                    email: d.email || d.username,
                    role: 'Owner',
                    isActive: true,
                    assignedAt: null
                };
            } else {
                ownerUser = null;
            }
            renderCombine();
        });

        // FestUsers Listener
        db.collection('festUsers').onSnapshot(snapshot => {
            festUsersList = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            renderCombine();
        });

        // ── View Toggle ────────────────────────────────────────────────
        function switchView(mode) {
            const isTable = mode === 'table';
            document.getElementById('view-table').style.display = isTable ? 'block' : 'none';
            document.getElementById('view-cards').style.display = isTable ? 'none' : 'block';

            const activeClassList = "bg-white shadow-sm text-[#111827] text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap";
            const inactiveClassList = "text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap";
            
            document.getElementById('btn-table').className = isTable ? activeClassList : inactiveClassList;
            document.getElementById('btn-cards').className = isTable ? inactiveClassList : activeClassList;
        }

        // ── Add / Edit Role Sidebar ────────────────────────────────────
        let currentEditId = null;

        function openAssignRole(userId = null) {
            currentEditId = userId;
            const title = document.getElementById('assignRoleTitle');
            const saveBtn = document.getElementById('btn-save-role');

            // Reset form
            ['ar-name','ar-username','ar-password'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('ar-role').value = '';
            document.getElementById('ar-team').value = '';
            document.getElementById('ar-team-container').classList.add('hidden');
            document.getElementById('ar-role-preview').classList.add('hidden');
            ['ar-username','ar-password'].forEach(id => arLock(id));

            if (userId && typeof userId === 'string') {
                // Edit Mode
                title.innerHTML = 'Edit Role';
                saveBtn.innerHTML = '<i class="fi fi-rr-check text-sm"></i> Update User';
                
                const user = festUsersList.find(u => u.id === userId);
                if (user) {
                    document.getElementById('ar-name').value = user.name || '';
                    document.getElementById('ar-username').value = user.username || '';
                    document.getElementById('ar-password').value = user.password || '';
                    document.getElementById('ar-role').value = user.role || '';
                    document.getElementById('ar-role').dispatchEvent(new Event('change'));
                    if (user.role === 'Team Manager' && user.team) {
                        document.getElementById('ar-team').value = user.team;
                    }
                }
            } else {
                // Add Mode
                currentEditId = null;
                title.innerHTML = 'Add Role';
                saveBtn.innerHTML = '<i class="fi fi-rr-check text-sm"></i> Add User & Assign Role';
            }

            // Filter role options: Only owner can create Admins
            const roleSelect = document.getElementById('ar-role');
            for (let i = 0; i < roleSelect.options.length; i++) {
                const opt = roleSelect.options[i];
                if (opt.value === 'Admin') {
                    opt.disabled = (localStorage.getItem('userRole') !== 'owner');
                    opt.style.display = (localStorage.getItem('userRole') !== 'owner' ? 'none' : 'block');
                }
            }

            document.getElementById('assignRoleOverlay').classList.remove('hidden');
            document.getElementById('assignRoleSidebar').classList.remove('translate-x-full');
            setTimeout(() => document.getElementById('ar-name').focus(), 320);
        }

        function closeAssignRole() {
            document.getElementById('assignRoleSidebar').classList.add('translate-x-full');
            document.getElementById('assignRoleOverlay').classList.add('hidden');
            currentEditId = null;
        }

        function arAutoGenerate() {
            if(currentEditId) return; // Only auto-generate on adding
            const name = document.getElementById('ar-name').value.trim();
            if (!name) return;
            const base = name.split(' ')[0].toLowerCase().replace(/[^a-z0-9]/g, '');
            const rand = Math.floor(100 + Math.random() * 900);
            
            const uEl = document.getElementById('ar-username');
            const pEl = document.getElementById('ar-password');
            if (uEl.readOnly) uEl.value = base + rand;
            if (pEl.readOnly) pEl.value = base.charAt(0).toUpperCase() + base.split('').reverse().join('') + rand + '@';
        }

        function arLock(id) {
            const el = document.getElementById(id);
            el.readOnly = true;
            if(id === 'ar-password') el.type = 'password';
            el.classList.add('bg-gray-100','text-gray-500','cursor-not-allowed');
            el.classList.remove('bg-white','text-gray-800');
            const lock = document.getElementById(id + '-lock');
            if (lock) lock.classList.remove('hidden');
            const labelEl = document.getElementById('ar-label-' + id.replace('ar-',''));
            if (labelEl) labelEl.textContent = 'Edit';
        }

        function arToggleEdit(id) {
            const el = document.getElementById(id);
            const lockId = id + '-lock';
            const labelId = 'ar-label-' + id.replace('ar-','');
            const lock = document.getElementById(lockId);
            const labelEl = document.getElementById(labelId);

            if (el.readOnly) {
                el.readOnly = false;
                el.type = 'text';
                el.classList.remove('bg-gray-100','text-gray-500','cursor-not-allowed');
                el.classList.add('bg-white','text-gray-800', 'border-brand-blue');
                if (lock) lock.classList.add('hidden');
                if (labelEl) labelEl.textContent = 'Lock';
                el.focus();
                el.select();
            } else {
                el.classList.remove('border-brand-blue');
                arLock(id);
            }
        }

        document.getElementById('ar-role').addEventListener('change', function() {
            const roleColors = {
                'Admin':        'bg-purple-500 text-white',
                'Team Manager': 'bg-teal-500 text-white',
                'Media':        'bg-[#F8843F] text-white'
            };
            const preview = document.getElementById('ar-role-preview');
            const badge   = document.getElementById('ar-role-badge');
            const role    = this.value;
            if (role) {
                badge.textContent  = role;
                badge.className    = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold ' + (roleColors[role] || 'bg-gray-300 text-gray-800');
                preview.classList.remove('hidden');
            } else {
                preview.classList.add('hidden');
            }

            const teamContainer = document.getElementById('ar-team-container');
            if (role === 'Team Manager') {
                teamContainer.classList.remove('hidden');
            } else {
                teamContainer.classList.add('hidden');
                document.getElementById('ar-team').value = '';
            }
        });

        function arSave() {
            const name     = document.getElementById('ar-name').value.trim();
            const username = document.getElementById('ar-username').value.trim();
            const password = document.getElementById('ar-password').value.trim();
            const role     = document.getElementById('ar-role').value;
            const team     = document.getElementById('ar-team').value;

            if (!name)     return arShake('ar-name');
            if (!username) return arShake('ar-username');
            if (!password) return arShake('ar-password');
            if (!role)     return arShake('ar-role');
            if (role === 'Team Manager' && !team) return arShake('ar-team');

            const saveBtn = document.getElementById('btn-save-role');
            const origHTML = saveBtn.innerHTML;
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<div class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></div> Saving…';

            const payload = { name, username, password, role };
            if (role === 'Team Manager') {
                payload.team = team;
            } else if (currentEditId) {
                payload.team = firebase.firestore.FieldValue.delete();
            }

            let promise;
            if (currentEditId) {
                promise = db.collection('festUsers').doc(currentEditId).update(payload);
            } else {
                payload.isActive = true;
                payload.assignedAt = firebase.firestore.FieldValue.serverTimestamp();
                payload.permissions = { userManagement: false, resultManagement: false, semiOwner: false };
                promise = db.collection('festUsers').add(payload);
            }

            promise.then(() => {
                closeAssignRole();
                saveBtn.disabled = false;
                saveBtn.innerHTML = origHTML;
                showToast(`<b>✅</b> User successfully ${currentEditId ? 'updated' : 'added'}!`);
            }).catch(err => {
                saveBtn.disabled = false;
                saveBtn.innerHTML = origHTML;
                showToast('<b>❌</b> Error: ' + err.message);
            });
        }

        function arShake(id) {
            const el = document.getElementById(id);
            el.classList.add('border-red-400','ring-2','ring-red-200');
            el.focus();
            setTimeout(() => el.classList.remove('border-red-400','ring-2','ring-red-200'), 1800);
        }

        // ── Permissions Sidebar ────────────────────────────────────────
        let currentPermUserId = null;

        function openPermissions(userId) {
            const user = festUsersList.find(u => u.id === userId);
            if (!user) return;

            currentPermUserId = userId;
            document.getElementById('perm-user-name').textContent = user.name || user.username;

            const perms = user.permissions || {};
            document.getElementById('perm-user-mgmt').checked = !!perms.userManagement;
            document.getElementById('perm-result-mgmt').checked = !!perms.resultManagement;
            document.getElementById('perm-semi-owner').checked = !!perms.semiOwner;

            document.getElementById('permissionsOverlay').classList.remove('hidden');
            document.getElementById('permissionsSidebar').classList.remove('translate-x-full');
        }

        function closePermissions() {
            document.getElementById('permissionsOverlay').classList.add('hidden');
            document.getElementById('permissionsSidebar').classList.add('translate-x-full');
            currentPermUserId = null;
        }

        function savePermissions() {
            if (!currentPermUserId) return;

            const btn = document.getElementById('btn-save-perms');
            const origHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></div> Saving…';

            const permissions = {
                userManagement: document.getElementById('perm-user-mgmt').checked,
                resultManagement: document.getElementById('perm-result-mgmt').checked,
                semiOwner: document.getElementById('perm-semi-owner').checked
            };

            db.collection('festUsers').doc(currentPermUserId).update({ permissions })
            .then(() => {
                closePermissions();
                btn.disabled = false;
                btn.innerHTML = origHTML;
                showToast('<b>✅</b> Permissions updated successfully!');
            }).catch(err => {
                showToast('<b>❌</b> Error: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = origHTML;
            });
        }

        // ── Missing Logic: Toggle User Active/Inactive ─────────────────
        function toggleUserStatus(userId, currentStatus) {
            const newStatus = !currentStatus;
            db.collection('festUsers').doc(userId).update({ isActive: newStatus })
            .then(() => {
                showToast(`<b>✅</b> User account ${newStatus ? 'activated' : 'deactivated'}!`);
            })
            .catch(err => showToast('<b>❌</b> Error updating status: ' + err.message));
        }

        // ── Delete User ────────────────────────────────────────────────
        function deleteUser(userId) {
            if (confirm("Are you sure you want to completely remove this user? This action cannot be undone.")) {
                db.collection('festUsers').doc(userId).delete()
                .then(() => showToast('<b>🗑️</b> User deleted successfully!'))
                .catch(err => showToast("<b>❌</b> Error deleting user: " + err.message));
            }
        }
    </script>
</body>
</html>
