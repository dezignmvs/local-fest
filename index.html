<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtFest'26 Login UI</title>

    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#134E8E">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Flaticon Uicons -->
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>

    <!-- Toastify CSS for React-Hot-Toast style -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <!-- Tailwind Configuration with Image Palette -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        palette: {
                            blue: '#134E8E',
                            red: '#C00707',
                            orange: '#FF4400',
                            yellow: '#FFB33F',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Animated Checkbox CSS -->
    <style>
        .check {
            cursor: pointer;
            position: relative;
            margin: 0;
            width: 18px;
            height: 18px;
            -webkit-tap-highlight-color: transparent;
            transform: translate3d(0, 0, 0);
            display: inline-block;
        }

        .check:before {
            content: "";
            position: absolute;
            top: -15px;
            left: -15px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(19, 78, 142, 0.08);
            /* #134E8E in RGB */
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .check svg {
            position: relative;
            z-index: 1;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke: #c8ccd4;
            stroke-width: 1.5;
            transform: translate3d(0, 0, 0);
            transition: all 0.2s ease;
        }

        .check svg path {
            stroke-dasharray: 60;
            stroke-dashoffset: 0;
        }

        .check svg polyline {
            stroke-dasharray: 22;
            stroke-dashoffset: 66;
        }

        .check:hover:before {
            opacity: 1;
        }

        .check:hover svg {
            stroke: #134E8E;
        }

        #cbx2:checked+.check svg {
            stroke: #134E8E;
        }

        #cbx2:checked+.check svg path {
            stroke-dashoffset: 60;
            transition: all 0.3s linear;
        }

        #cbx2:checked+.check svg polyline {
            stroke-dashoffset: 42;
            transition: all 0.2s linear;
            transition-delay: 0.15s;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 sm:p-8 font-sans">

    <!-- Container -->
    <div
        class="bg-white rounded-[2rem] shadow-xl flex flex-col lg:flex-row w-full max-w-[750px] p-2 border border-gray-100 overflow-hidden relative">

        <!-- LEFT SECTION -->
        <div
            class="hidden lg:flex bg-palette-blue rounded-[1.5rem] px-6 lg:px-8 py-12 lg:w-[45%] flex-col justify-center gap-10 relative overflow-hidden text-center z-10 shadow-inner">

            <!-- Background Decorations -->
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-white/10 rounded-full blur-xl pointer-events-none"></div>
            <div class="absolute bottom-10 -right-10 w-48 h-48 bg-black/20 rounded-full blur-md pointer-events-none">
            </div>
            <div class="absolute top-1/2 left-0 w-24 h-24 bg-palette-yellow/10 rounded-full pointer-events-none"></div>

            <!-- Logo Pill -->
            <div
                class="mx-auto flex items-center justify-center gap-2 bg-white/10 border border-white/20 backdrop-blur-sm py-2 px-5 rounded-full w-max relative z-20">
                <div class="bg-white/20 rounded p-1 flex items-center justify-center overflow-hidden">
                    <img src="logo-192.svg" class="w-6 h-6 object-contain" alt="Logo">
                </div>
                <span class="fest-name-display text-white font-bold text-lg tracking-wide">ArtFest'26</span>
            </div>

            <!-- Features with Palette Colors & Flaticons -->
            <div class="space-y-3 relative z-20">
                <div
                    class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-xl p-3 text-left hover:bg-white/10 transition-colors">
                    <div class="bg-palette-red p-2.5 rounded-lg flex items-center justify-center">
                        <i class="fi fi-rr-users text-white text-base leading-none"></i>
                    </div>
                    <div>
                        <h3 class="text-white text-[13px] font-semibold">Candidate Management</h3>
                        <p class="text-blue-200 text-[10px] opacity-80">Register & track participants</p>
                    </div>
                </div>

                <div
                    class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-xl p-3 text-left hover:bg-white/10 transition-colors">
                    <div class="bg-palette-orange p-2.5 rounded-lg flex items-center justify-center">
                        <i class="fi fi-rr-trophy text-white text-base leading-none"></i>
                    </div>
                    <div>
                        <h3 class="text-white text-[13px] font-semibold">Results & Awards</h3>
                        <p class="text-blue-200 text-[10px] opacity-80">Publish results instantly</p>
                    </div>
                </div>

                <div
                    class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-xl p-3 text-left hover:bg-white/10 transition-colors">
                    <div class="bg-palette-yellow p-2.5 rounded-lg flex items-center justify-center">
                        <i class="fi fi-rr-calendar text-palette-blue text-base leading-none"></i>
                    </div>
                    <div>
                        <h3 class="text-white text-[13px] font-semibold">Smart Scheduling</h3>
                        <p class="text-blue-200 text-[10px] opacity-80">Organize events with ease</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT SECTION (FORM) -->
        <div
            class="px-6 py-8 sm:px-8 lg:px-10 w-full lg:w-[55%] flex flex-col justify-center bg-white rounded-[1.5rem]">

            <!-- Mobile Logo Backup -->
            <div class="lg:hidden flex justify-center mb-6">
                <div class="flex items-center gap-2 bg-palette-blue py-2 px-6 rounded-full shadow-sm">
                    <div class="bg-white/20 rounded p-1 flex items-center justify-center overflow-hidden">
                        <img src="logo-192.svg" class="w-6 h-6 object-contain" alt="Logo">
                    </div>
                    <span class="fest-name-display text-white font-bold text-lg tracking-wide">ArtFest'26</span>
                </div>
            </div>

            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Welcome Back</h2>
                <p class="text-sm text-gray-500 mt-1">Please enter your details to sign in.</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-5 w-full max-w-[340px] mx-auto">

                <!-- Username -->
                <div>
                    <label for="username" class="block text-xs font-semibold text-gray-700 mb-1.5">User name</label>
                    <input type="text" id="username" placeholder="Enter your user name"
                        class="w-full px-4 py-2.5 bg-gray-50 rounded-lg border border-gray-200 focus:bg-white focus:outline-none focus:ring-2 focus:ring-palette-blue/40 focus:border-palette-blue transition-all text-sm text-gray-800 placeholder-gray-400">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-xs font-semibold text-gray-700 mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="Enter your password"
                            class="w-full px-4 py-2.5 bg-gray-50 rounded-lg border border-gray-200 focus:bg-white focus:outline-none focus:ring-2 focus:ring-palette-blue/40 focus:border-palette-blue transition-all text-sm text-gray-800 placeholder-gray-400 pr-10">

                        <button type="button" onclick="togglePassword()"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-palette-blue transition-colors cursor-pointer outline-none">
                            <i id="eye-icon" class="fi fi-rr-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center mt-2">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="cbx2" style="display: none;">
                        <label for="cbx2" class="check">
                            <svg width="16px" height="16px" viewBox="0 0 18 18">
                                <path
                                    d="M 1 9 L 1 9 c 0 -5 3 -8 8 -8 L 9 1 C 14 1 17 5 17 9 L 17 9 c 0 4 -4 8 -8 8 L 9 17 C 5 17 1 14 1 9 L 1 9 Z">
                                </path>
                                <polyline points="1 9 7 14 15 4"></polyline>
                            </svg>
                        </label>
                        <label for="cbx2"
                            class="text-xs text-gray-600 font-medium cursor-pointer select-none hover:text-gray-900 transition">Remember
                            me</label>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full flex justify-center items-center gap-2 bg-palette-blue hover:opacity-90 text-white font-semibold py-2.5 px-4 rounded-lg transition-all duration-300 transform hover:-translate-y-[2px] shadow-md hover:shadow-lg hover:shadow-palette-blue/40 text-sm mt-6">
                    <i class="fi fi-rr-sign-in-alt text-[15px]"></i>
                    Sign In
                </button>

                <!-- Install App Button (Hidden by default, shown by JS when install is possible) -->
                <button type="button" id="installAppBtn" style="display: none;"
                    class="w-full flex justify-center items-center gap-2 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-semibold py-2.5 px-4 rounded-lg transition-all text-sm mt-3">
                    <i class="fi fi-rr-download text-[15px]"></i>
                    Install App
                </button>

            </form>
        </div>
    </div>

    <!-- Firebase JS SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- Toggle Password Script & Login Logic -->
    <script>
        // Check if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }

        // Handle "Remember Me" on page load
        document.addEventListener('DOMContentLoaded', () => {
            const rememberedUser = localStorage.getItem('rememberedUsername');
            if (rememberedUser) {
                document.getElementById('username').value = rememberedUser;
                document.getElementById('cbx2').checked = true;
            }
        });

        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCKA0k_9UgoJX_RBgEsIeNdiW2w0Okko1o",
            authDomain: "festie-s1u2h3.firebaseapp.com",
            projectId: "festie-s1u2h3",
            storageBucket: "festie-s1u2h3.firebasestorage.app",
            messagingSenderId: "794049194885",
            appId: "1:794049194885:web:8f75f0df4c15cde15eb2ec",
            measurementId: "G-P2TS8F6LLJ"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        // Listen for Firestore DB changes for Fest Data
        firebase.firestore().collection('config').doc('festData').onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data && data.name) {
                    document.querySelectorAll('.fest-name-display').forEach(el => {
                        el.innerText = data.name;
                    });
                    document.title = data.name + " Login UI";
                }
            }
        });

        // React-hot-toast style toast using Toastify
        function showToast(message) {
            Toastify({
                text: message,
                duration: 2000,
                gravity: "top",
                position: "center",
                style: {
                    background: "#ffffff",
                    color: "#333",
                    boxShadow: "0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)",
                    borderRadius: "8px",
                    border: "1px solid #eaeaea",
                    padding: "12px 24px",
                    display: "flex",
                    alignItems: "center",
                    gap: "8px",
                    fontSize: "14px",
                    fontWeight: "500",
                    fontFamily: "'Inter', sans-serif"
                },
                escapeMarkup: false
            }).showToast();
        }

        const loginBtn = document.querySelector('#loginForm button[type="submit"]');

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            // Loading state
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<div class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></div> Signing in...';
            loginBtn.disabled = true;

            const resetBtn = () => {
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            };

            const handleRememberMe = (username) => {
                if (document.getElementById('cbx2').checked) {
                    localStorage.setItem('rememberedUsername', username);
                } else {
                    localStorage.removeItem('rememberedUsername');
                }
            };

            const fallbackLogin = () => {
                if (user === 'admin' && pass === '81119') {
                    // Seed initial data to firestore so it isn't empty!
                    firebase.firestore().collection('admin').doc('credentials').set({ username: 'admin', password: '81119', name: 'ARfets' }).catch(() => {});
                    firebase.firestore().collection('config').doc('festData').set({ name: 'ARfets', isActive: true }).catch(() => {});

                    showToast('<b>✅</b> Successfully logged in!');
                    localStorage.setItem('isLoggedIn', 'true');
                    handleRememberMe(user);
                    window.location.href = 'dashboard.html';
                } else {
                    resetBtn();
                    showToast('<b>❌</b> Invalid username or password!');
                }
            };

            // ── Step 1: Check Owner (admin) credentials ──────────────────
            const dbRef = firebase.firestore().collection('admin').doc('credentials');

            dbRef.get().then((doc) => {
                const creds = doc.exists ? doc.data() : null;
                let validUser = 'admin';
                let validPass = '81119';
                if (creds) {
                    validUser = creds.username;
                    validPass = creds.password;
                }

                if (user === validUser && pass === validPass) {
                    // Owner login — always allowed
                    if (!doc.exists) {
                        dbRef.set({ username: 'admin', password: '81119', name: 'ARfets' }).catch(() => {});
                        firebase.firestore().collection('config').doc('festData').set({ name: 'ARfets', isActive: true }).catch(() => {});
                    }
                    showToast('<b>✅</b> Successfully logged in!');
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userRole', 'owner');
                    localStorage.setItem('userManagement', 'true');
                    localStorage.setItem('resultManagement', 'true');
                    localStorage.setItem('semiOwner', 'true');
                    const ownerName = doc.exists ? (doc.data().name || doc.data().username) : 'Suhail';
                    localStorage.setItem('festUserName', ownerName);
                    localStorage.setItem('festUserId', 'owner');
                    handleRememberMe(user);
                    window.location.href = 'dashboard.html';
                    return;
                }

                // ── Step 2: Check Fest Users (assigned roles) ─────────────
                firebase.firestore().collection('festUsers')
                    .where('username', '==', user)
                    .where('password', '==', pass)
                    .get()
                    .then((snapshot) => {
                        if (!snapshot.empty) {
                            const festUserDoc = snapshot.docs[0];
                            const festUser = festUserDoc.data();

                            // ── isActive check ─────────────────────────────
                            if (festUser.isActive === false) {
                                resetBtn();
                                showToast('<b>🚫</b> Your account has been deactivated. Please contact the owner.');
                                return;
                            }

                            // Active fest user — allow login
                            showToast('<b>✅</b> Successfully logged in!');
                            localStorage.setItem('isLoggedIn', 'true');
                            localStorage.setItem('userRole', festUser.role || 'user');
                            localStorage.setItem('festUserId', festUserDoc.id);
                            localStorage.setItem('festUserName', festUser.name || festUser.username);
                            
                            // Store permissions (explicitly as string 'true' or 'false' for consistency)
                            const perms = festUser.permissions || {};
                            localStorage.setItem('userManagement', perms.userManagement ? 'true' : 'false');
                            localStorage.setItem('resultManagement', perms.resultManagement ? 'true' : 'false');
                            localStorage.setItem('semiOwner', perms.semiOwner ? 'true' : 'false');
                            
                            if (festUser.role === 'Team Manager') {
                                localStorage.setItem('managerTeam', festUser.team || 'Unassigned');
                            } else {
                                localStorage.removeItem('managerTeam');
                            }

                            handleRememberMe(user);
                            window.location.href = 'dashboard.html';
                        } else {
                            resetBtn();
                            showToast('<b>❌</b> Invalid username or password!');
                        }
                    })
                    .catch((err) => {
                        console.warn('Fest user lookup failed:', err);
                        resetBtn();
                        showToast('<b>❌</b> Invalid username or password!');
                    });

            }).catch(error => {
                console.warn("Database unavailable, falling back to local auth.", error);
                fallbackLogin();
            });
        });

        // Enable ENTER key to submit form from inputs
        document.querySelectorAll('#username, #password').forEach(input => {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    loginBtn.click();
                }
            });
        });

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fi-rr-eye');
                eyeIcon.classList.add('fi-rr-eye-crossed');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fi-rr-eye-crossed');
                eyeIcon.classList.add('fi-rr-eye');
            }
        }
    </script>

    <!-- PWA Service Worker Registration & Install Logic -->
    <script>
      // This function will be called when a new SW is waiting.
      function showUpdateBar(worker) {
          const toast = Toastify({
              text: `
                  <div class="flex items-center justify-between w-full">
                      <span class="font-semibold">A new version is available!</span>
                      <button id="sw-update-button" class="ml-4 px-3 py-1 bg-[#134E8E] text-white rounded-lg text-xs font-bold hover:bg-opacity-80 transition-opacity">Reload</button>
                  </div>
              `,
              duration: -1, // Sticky
              gravity: "bottom",
              position: "center",
              style: {
                  background: "#fff",
                  color: "#333",
                  boxShadow: "0 10px 40px -10px rgba(0,0,0,0.1)",
                  borderRadius: "1.5rem",
                  border: "1px solid #eaeaea",
                  padding: "16px 24px",
                  fontSize: "13px",
                  fontFamily: "'Inter', sans-serif"
              },
              escapeMarkup: false,
              close: true,
          }).showToast();

          document.body.addEventListener('click', function onBodyClick(e) {
              if (e.target && e.target.id === 'sw-update-button') {
                  worker.postMessage({ type: 'SKIP_WAITING' });
                  toast.hideToast();
                  document.body.removeEventListener('click', onBodyClick);
              }
          });
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => {
                console.log('Service Worker registered successfully.', reg);
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            showUpdateBar(newWorker);
                        }
                    });
                });
            })
            .catch(err => console.error('Service Worker registration failed:', err));

            let refreshing;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                window.location.reload();
                refreshing = true;
            });
        });
      }

      let deferredPrompt;
      const installAppBtn = document.getElementById('installAppBtn');

      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        deferredPrompt = e;
        // Update UI notify the user they can install the PWA
        if (installAppBtn) installAppBtn.style.display = 'flex';
      });

      installAppBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          // Show the install prompt
          deferredPrompt.prompt();
          // Wait for the user to respond to the prompt
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            console.log('User accepted the install prompt');
          } else {
            console.log('User dismissed the install prompt');
          }
          // We've used the prompt, and can't use it again, throw it away
          deferredPrompt = null;
          installAppBtn.style.display = 'none';
        }
      });

      window.addEventListener('appinstalled', (evt) => {
        // Log install to analytics
        console.log('INSTALL: Success');
        installAppBtn.style.display = 'none';
      });
    </script>
</body>
