<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Team Dashboard Module</title>
</head>
<body>
    <div class="mb-6 shrink-0 pt-2">
        <h1 id="tm-section-title" class="text-xl sm:text-[22px] font-semibold text-gray-900 leading-tight">Candidates</h1>
        <p class="text-[13px] text-gray-500 mt-1">Candidates actively registered to your team</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col overflow-hidden flex-1 min-h-[400px]">
        <div class="p-4 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4 bg-gray-50/50 shrink-0">
            <div class="relative w-full sm:w-80">
                <i class="fi fi-rr-search absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-[13px]"></i>
                <input type="text" id="tm-search-input" oninput="window.renderTMCandidates()" placeholder="Search name, chest, or adm no..." 
                    class="w-full pl-9 pr-4 py-2 bg-white border border-gray-200 rounded-lg text-[13px] focus:outline-none focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue transition-all">
            </div>
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="flex items-center gap-2 w-full sm:w-auto bg-white border border-gray-200 rounded-lg px-3 py-1 shadow-sm">
                    <i class="fi fi-rr-filter text-xs text-gray-400"></i>
                    <select id="tm-filter-class" onchange="window.renderTMCandidates()" class="w-full bg-transparent text-[13px] text-gray-700 focus:outline-none py-1.5 appearance-none cursor-pointer pr-4 font-medium">
                        <option value="">All Classes</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="overflow-auto w-full flex-1 relative custom-scrollbar">
            <div class="w-full min-w-[700px]">
                <div class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-[#FAFAFA] sticky top-0 z-10 shadow-sm">
                    <div class="col-span-2 text-[11px] font-bold text-gray-400 uppercase tracking-wider">Chest No</div>
                    <div class="col-span-3 text-[11px] font-bold text-gray-400 uppercase tracking-wider">Admission No</div>
                    <div class="col-span-5 text-[11px] font-bold text-gray-400 uppercase tracking-wider">Candidate Name</div>
                    <div class="col-span-2 text-[11px] font-bold text-gray-400 uppercase tracking-wider">Class</div>
                </div>
                <div id="tm-candidates-tbody">
                    <div class="px-6 py-12 text-center text-sm text-gray-400"><div class="w-6 h-6 border-2 border-gray-200 border-t-brand-blue rounded-full animate-spin mx-auto mb-2"></div>Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('tm-section-title').innerText = (window.currentTMSection || 'Section') + ' Candidates';
        var tmTeam = localStorage.getItem('managerTeam');
        var sectionName = window.currentTMSection;

        if (window.tmCandUnsub) window.tmCandUnsub();
        
        if (typeof db !== 'undefined' && sectionName && tmTeam) {
            // Fetch Team color for UI rendering
            window.tmTeamColor = '#134E8E'; // Default brand color
            db.collection('teams').where('name', '==', tmTeam).limit(1).get().then(snap => {
                if (!snap.empty) {
                    window.tmTeamColor = snap.docs[0].data().color || '#134E8E';
                    if (window.tmCandidatesData) window.renderTMCandidates();
                }
            });

            window.tmCandUnsub = db.collection('candidates')
                .where('team', '==', tmTeam)
                .onSnapshot(snap => {
                    // Filter by section locally to bypass Firebase Composite Index requirements
                    window.tmCandidatesData = snap.docs.map(doc => doc.data()).filter(c => c.section === sectionName);
                    
                    const classSelect = document.getElementById('tm-filter-class');
                    if (classSelect) {
                        const currentVal = classSelect.value;
                        const uniqueClasses = [...new Set(window.tmCandidatesData.map(c => c.class).filter(c => typeof c === 'string' && c.trim() !== ''))].sort();
                        classSelect.innerHTML = '<option value="">All Classes</option>' + uniqueClasses.map(cls => `<option value="${cls}">${cls}</option>`).join('');
                        if (uniqueClasses.includes(currentVal)) classSelect.value = currentVal;
                    }
                    window.renderTMCandidates();
                }, err => {
                    console.error("Firestore Error:", err);
                    const tbody = document.getElementById('tm-candidates-tbody');
                    if (tbody) tbody.innerHTML = `<div class="px-6 py-12 text-center text-[13px] text-red-500 font-medium">Database connection error. Check console.</div>`;
                });
        }

        window.renderTMCandidates = function() {
            const tbody = document.getElementById('tm-candidates-tbody');
            if (!tbody) return;
            
            const searchQ = (document.getElementById('tm-search-input')?.value || '').toLowerCase().trim();
            const classQ = document.getElementById('tm-filter-class')?.value || '';
            
            let filtered = window.tmCandidatesData || [];
            
            if (searchQ) {
                filtered = filtered.filter(c => 
                    (c.name && c.name.toLowerCase().includes(searchQ)) ||
                    (c.chestNo && String(c.chestNo).toLowerCase().includes(searchQ)) ||
                    (c.admissionNo && String(c.admissionNo).toLowerCase().includes(searchQ))
                );
            }
            
            if (classQ) {
                filtered = filtered.filter(c => c.class === classQ);
            }
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<div class="px-6 py-16 text-center text-[13px] text-gray-500 font-medium bg-gray-50/30">No candidates match your search or filter criteria.</div>';
                return;
            }
            
            const tColor = window.tmTeamColor || '#134E8E';
            
            tbody.innerHTML = filtered.map(c => `
                <div class="grid grid-cols-12 gap-4 items-center py-2.5 px-6 border-b border-gray-100 bg-white hover:bg-gray-50 transition-colors group">
                    <div class="col-span-2 flex items-center">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-[11px] shadow-sm border shrink-0" style="background-color: ${tColor}15; color: ${tColor}; border-color: ${tColor}30;" title="Chest No: ${c.chestNo || 'N/A'}">${c.chestNo || '?'}</div>
                    </div>
                    <div class="col-span-3 text-[12px] font-mono-custom text-gray-500">${c.admissionNo || '—'}</div>
                    <div class="col-span-5 text-[13.5px] font-medium text-gray-900">${c.name || '—'}</div>
                    <div class="col-span-2"><span class="px-2.5 py-1 bg-gray-100 text-gray-600 rounded-md text-[11px] font-medium border border-gray-200">${c.class || 'N/A'}</span></div>
                </div>
            `).join('');
        };
    </script>
</body>
</html>
