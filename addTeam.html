<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams UI - Responsive Toggle</title>
    <link rel="icon" type="image/svg+xml" href="logo-192.svg?v=4">
    <!-- Load Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            bg: '#f8f9fc',
                            border: '#e5e7eb',
                            textMuted: '#6b7280',
                            textDark: '#111827',
                            blue: '#134E8E',
                            red: '#C00707',
                            orange: '#FF4400',
                            yellow: '#FFB33F'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        i[class^="fi-"] { display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        
        /* Hide scrollbar for a cleaner look on mobile tables */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Dropdown animation */
        .dropdown-enter { animation: drop-in 0.15s ease-out forwards; transform-origin: top right; }
        @keyframes drop-in {
            0% { opacity: 0; transform: scale(0.95) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="bg-brand-bg font-sans min-h-screen p-4 sm:p-6 md:p-8">

    <div class="max-w-full w-full mx-auto">
        
        <!-- Header Section (Updated for Mobile Responsiveness) -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl sm:text-[22px] font-semibold text-gray-900 leading-tight">Teams</h1>
                <p class="text-[12px] sm:text-[13px] text-gray-500 mt-0.5 sm:mt-1">Manage candidate teams</p>
            </div>
            
            <div class="flex items-center ml-4">
                <!-- Add Team Button -->
                <button onclick="window.openTeamSidebar()" class="flex items-center justify-center gap-2 w-10 h-10 sm:w-auto sm:px-5 sm:py-2.5 bg-[#FFB33F] border border-transparent rounded-full text-[13px] font-bold text-[#111827] hover:bg-opacity-90 transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5 whitespace-nowrap p-0">
                    <i class="fi fi-rr-add text-sm sm:text-[13px]"></i>
                    <span class="hidden sm:block">Add Team</span>
                </button>
            </div>
        </div>

        <!-- Main Card Area -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] overflow-hidden">
            
            <!-- Toolbar -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-4 border-b border-gray-100 gap-4 sm:gap-0">
                
                <!-- View Toggles -->
                <div class="flex bg-gray-100/80 p-1 rounded-lg items-center w-full sm:w-auto overflow-x-auto no-scrollbar border border-gray-200/60">
                    <button id="btn-table" onclick="switchView('table')" class="bg-white shadow-sm text-[#111827] text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap">
                        <i class="fi fi-rr-table-list text-xs shrink-0"></i> Table
                    </button>
                    <button id="btn-cards" onclick="switchView('cards')" class="text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap">
                        <i class="fi fi-rr-grid text-xs shrink-0"></i> Cards
                    </button>
                </div>

                <!-- Actions / Search -->
                <div class="flex items-center gap-3 w-full sm:w-auto mt-3 sm:mt-0">
                    <div class="relative w-full sm:w-64">
                        <i class="fi fi-rr-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" id="search-teams" oninput="applyTeamFilters()" placeholder="Search teams..." 
                            class="w-full pl-8 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-full text-[13px] focus:outline-none focus:ring-2 focus:ring-[#FFB33F]/30 focus:border-[#FFB33F] transition-all">
                    </div>
                </div>
            </div>

            <!-- Global Bulk Action Header -->
            <div id="bulk-header" class="hidden flex items-center justify-between py-2.5 px-6 border-b border-gray-100 bg-blue-50/50">
                <div class="flex items-center space-x-4">
                    <div onclick="toggleAllTeams(event)" class="w-5 h-5 rounded-full flex items-center justify-center bg-[#FFC107] cursor-pointer shadow-sm hover:scale-105 transition-transform">
                        <i class="fi fi-rr-check text-[10px] text-white"></i>
                    </div>
                    <span class="text-[13px] font-semibold text-gray-800"><span id="selected-count-text">1</span> selected</span>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="deleteSelectedTeams()" class="flex items-center justify-center gap-2 px-4 py-1.5 bg-[#DC2626] border border-transparent rounded-md text-[13px] font-medium text-white hover:bg-red-700 shadow-sm transition-colors">
                        <i class="fi fi-rr-trash text-sm"></i>
                        Delete Selected
                    </button>
                </div>
            </div>

            <!-- ================= TABLE VIEW ================= -->
            <div id="view-table" class="block w-full overflow-x-auto">
                <div id="team-table-container" class="w-full min-w-[800px]">
                    <!-- Table Header -->
                    <div id="standard-header" class="grid grid-cols-12 gap-4 items-center py-3 px-6 border-b border-gray-100 bg-[#FAFAFA]">
                        <div class="col-span-1 flex items-center">
                            <div onclick="toggleAllTeams(event)" class="w-5 h-5 rounded-full border-2 border-gray-200 hover:border-[#FFC107] cursor-pointer transition-colors" id="master-checkbox"></div>
                        </div>
                        <div class="col-span-4 text-[13px] font-medium text-gray-700">Team</div>
                        <div class="col-span-2 text-[13px] font-medium text-gray-700">Color</div>
                        <div class="col-span-2 text-[13px] font-medium text-gray-700 text-center">Series</div>
                        <div class="col-span-2 text-[13px] font-medium text-gray-700 text-center">Status</div>
                        <div class="col-span-1 text-[13px] font-medium text-gray-700 text-right">Actions</div>
                    </div>

                    <!-- Table Body -->
                    <div id="team-table-list"></div>
                </div>
            </div>

            <!-- ================= CARDS VIEW ================= -->
            <div id="view-cards" class="hidden p-6 bg-gray-50/50">
                <div id="team-cards-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            </div>

            <!-- Footer / Pagination -->
            <div class="flex flex-col sm:flex-row justify-between items-center py-3 px-4 sm:px-6 bg-white border-t border-gray-100 text-[13px] text-gray-600">
                <div class="flex items-center space-x-2 sm:space-x-3 mb-3 sm:mb-0">
                    <span id="results-count">Showing results</span>
                    <span class="text-gray-300 text-[10px] hidden sm:inline">●</span>
                    <div class="relative ml-2 sm:ml-0">
                        <select id="team-per-page" onchange="changeTeamPerPage(this.value)" class="appearance-none border border-gray-200 rounded-md py-1 pl-2 pr-6 bg-white outline-none hover:border-gray-300 focus:border-gray-400 cursor-pointer">
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                            <i class="fi fi-rr-angle-small-down text-[10px]"></i>
                        </div>
                    </div>
                </div>

                <div class="flex items-center space-x-3 sm:space-x-4">
                    <button id="team-prev-page" onclick="changeTeamPage(-1)" class="w-7 h-7 flex items-center justify-center rounded-md border border-gray-200 text-gray-400 hover:text-gray-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fi fi-rr-angle-small-left text-xs"></i>
                    </button>
                    <span id="team-page-info" class="text-gray-600 text-[12px] sm:text-[13px]">Page 1 of 1</span>
                    <button id="team-next-page" onclick="changeTeamPage(1)" class="w-7 h-7 flex items-center justify-center rounded-md border border-gray-200 text-gray-400 hover:text-gray-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fi fi-rr-angle-small-right text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Action Menu -->
    <div id="global-action-menu" class="hidden fixed w-36 bg-white border border-gray-200 rounded-lg shadow-xl z-[100] py-1 overflow-hidden dropdown-enter">
        <button id="btn-view" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-gray-700 hover:bg-gray-50 flex items-center transition-colors">
            <i class="fi fi-rr-eye text-[15px] mr-2.5 text-gray-500"></i> View
        </button>
        <button id="btn-edit" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-gray-700 hover:bg-gray-50 flex items-center transition-colors">
            <i class="fi fi-rr-edit text-[15px] mr-2.5 text-gray-500"></i> Edit
        </button>
        <div class="border-t border-gray-100 my-0.5"></div>
        <button id="btn-delete" class="w-full text-left px-4 py-2.5 text-[13px] font-medium text-red-600 hover:bg-red-50 flex items-center transition-colors">
            <i class="fi fi-rr-trash text-[15px] mr-2.5 text-red-500"></i> Delete
        </button>
    </div>

    <!-- Add Team Sidebar Overlay & Panel -->
    <div id="teamOverlay" onclick="window.closeTeamSidebar()" class="fixed inset-0 bg-gray-900/60 z-[60] hidden transition-opacity duration-300"></div>
    
    <div id="teamSidebar" class="fixed inset-y-0 right-0 w-full sm:w-[450px] bg-white shadow-[-10px_0_30px_rgba(0,0,0,0.1)] z-[70] transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <!-- Sidebar content -->
        <div class="px-6 py-5 flex items-center justify-between bg-white border-b border-gray-100">
            <h2 id="teamSidebarTitle" class="text-[18px] font-bold text-gray-900">Add Team</h2>
            <button onclick="window.closeTeamSidebar()" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:bg-gray-200 hover:text-gray-700 transition-colors">
                <i class="fi fi-rr-cross text-sm"></i>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6 space-y-5">
            <div>
                <label class="block text-[13px] font-medium text-gray-800 mb-1.5">Team Name *</label>
                <input type="text" id="teamName" class="w-full px-4 py-2 bg-white border border-gray-300 rounded-full text-[13px] focus:outline-none focus:ring-1 focus:ring-[#FFB33F] focus:border-[#FFB33F] transition-all" placeholder="e.g. Red Team">
            </div>
            <div>
                <label class="block text-[13px] font-medium text-gray-800 mb-1.5">Chest No. Series Base</label>
                <input type="number" id="teamSeries" class="w-full px-4 py-2 bg-white border border-gray-300 rounded-full text-[13px] focus:outline-none focus:ring-1 focus:ring-[#FFB33F] focus:border-[#FFB33F] transition-all" placeholder="e.g. 100, 200, 300">
            </div>
            <div>
                <label class="block text-[13px] font-medium text-gray-800 mb-1.5">Color *</label>
                <div class="flex items-center gap-3">
                    <div class="relative w-10 h-10 rounded-full overflow-hidden shrink-0 border border-gray-200 shadow-sm hover:scale-105 transition-transform cursor-pointer">
                        <input type="color" id="teamColorPicker" class="absolute -top-2 -left-2 w-14 h-14 cursor-pointer border-0 p-0 outline-none appearance-none" value="#FF0000" oninput="document.getElementById('teamColorText').value = this.value">
                    </div>
                    <input type="text" id="teamColorText" class="flex-1 px-4 py-2 bg-white border border-gray-300 rounded-full text-[13px] font-mono-custom focus:outline-none focus:ring-1 focus:ring-[#FFB33F] focus:border-[#FFB33F] transition-all uppercase" value="#FF0000" oninput="document.getElementById('teamColorPicker').value = this.value">
                </div>
            </div>
            <div class="flex items-center mt-2">
                <label class="relative inline-flex items-center cursor-pointer group">
                    <input type="checkbox" id="teamActive" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-[#FFB33F]/20 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#FFB33F] shadow-inner transition-colors"></div>
                    <span class="ml-3 text-[13px] font-medium text-gray-800 group-hover:text-gray-900 transition-colors">Active Team</span>
                </label>
            </div>
        </div>
        
        <div class="p-6 bg-white flex justify-end gap-3 border-t border-gray-100">
            <button onclick="window.closeTeamSidebar()" class="flex items-center justify-center gap-2 px-5 py-2 bg-white border border-gray-300 text-gray-700 rounded-full text-[13px] font-bold hover:bg-gray-50 transition-all shadow-sm">
                <i class="fi fi-rr-cross text-xs"></i> Cancel
            </button>
            <button id="btn-save-team" onclick="window.saveTeam()" class="flex items-center justify-center gap-2 px-5 py-2 bg-[#FFB33F] text-[#111827] rounded-full text-[13px] font-bold hover:bg-opacity-90 transition-all shadow-sm">
                <i class="fi fi-rr-disk text-sm"></i>
                <span id="btn-save-team-text">Save Team</span>
            </button>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        var teamsData = [];
        
        var selectedTeamIds = new Set();
        var editingTeamId = null;
        var activeTeamDropdownId = null;
        var teamCurrentPage = 1;
        var teamItemsPerPage = 25;

        window.switchView = function(viewName) {
            const viewTable = document.getElementById('view-table');
            const viewCards = document.getElementById('view-cards');
            const btnTable = document.getElementById('btn-table');
            const btnCards = document.getElementById('btn-cards');

            const activeClassList = "bg-white shadow-sm text-[#111827] text-[13px] font-semibold py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap";
            const inactiveClassList = "text-gray-500 hover:text-gray-800 bg-transparent text-[13px] font-medium py-1.5 px-4 rounded-md flex items-center justify-center gap-2 transition-all duration-200 whitespace-nowrap";

            if (viewName === 'table') {
                viewTable.classList.remove('hidden');
                viewCards.classList.add('hidden');
                btnTable.className = activeClassList;
                btnCards.className = inactiveClassList;
            } else if (viewName === 'cards') {
                viewTable.classList.add('hidden');
                viewCards.classList.remove('hidden');
                btnTable.className = inactiveClassList;
                btnCards.className = activeClassList;
            }
        }

        function getUncheckedIcon(id) {
            return `<div onclick="toggleTeamSelection('${id}', event)" class="w-5 h-5 rounded-full border-2 border-gray-200 hover:border-[#FFC107] bg-white cursor-pointer transition-colors"></div>`;
        }
        function getCheckedIcon(id) {
            return `<div onclick="toggleTeamSelection('${id}', event)" class="w-5 h-5 rounded-full flex items-center justify-center bg-[#FFC107] cursor-pointer hover:scale-105 transition-transform">
                        <i class="fi fi-rr-check text-[10px] text-white"></i>
                    </div>`;
        }

        function getActionMenu(id) {
            return `
                <div class="relative inline-block text-left menu-container">
                    <button onclick="openActionMenu('${id}', event)" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 transition-colors text-gray-400 hover:text-gray-800">
                        <i class="fi fi-rr-menu-dots-vertical text-xs"></i>
                    </button>
                </div>`;
        }

        var teamSearchQuery = '';
        
        window.changeTeamPage = function(dir) {
            teamCurrentPage += dir;
            renderTeamsUI();
        };
        
        window.changeTeamPerPage = function(val) {
            teamItemsPerPage = parseInt(val);
            teamCurrentPage = 1;
            renderTeamsUI();
        };

        function applyTeamFilters() {
            teamSearchQuery = document.getElementById('search-teams').value.toLowerCase().trim();
            teamCurrentPage = 1;
            renderTeamsUI();
        }

        function getFilteredTeams() {
            if (!teamSearchQuery) return teamsData;
            return teamsData.filter(t => 
                (t.name && t.name.toLowerCase().includes(teamSearchQuery)) ||
                (t.color && t.color.toLowerCase().includes(teamSearchQuery))
            );
        }

        function renderTeamsUI() {
            const tableList = document.getElementById('team-table-list');
            const cardsList = document.getElementById('team-cards-list');
            const stdHeader = document.getElementById('standard-header');
            const blkHeader = document.getElementById('bulk-header');
            
            const filteredData = getFilteredTeams();
            
            const totalItems = filteredData.length;
            const totalPages = Math.ceil(totalItems / teamItemsPerPage) || 1;
            if (teamCurrentPage > totalPages) teamCurrentPage = totalPages;
            if (teamCurrentPage < 1) teamCurrentPage = 1;
            const startIndex = (teamCurrentPage - 1) * teamItemsPerPage;
            const endIndex = Math.min(startIndex + teamItemsPerPage, totalItems);
            const paginatedData = filteredData.slice(startIndex, endIndex);

            document.getElementById('results-count').innerText = `Showing ${totalItems > 0 ? startIndex + 1 : 0} to ${endIndex} of ${totalItems} results`;
            document.getElementById('team-page-info').innerText = `Page ${teamCurrentPage} of ${totalPages}`;
            document.getElementById('team-prev-page').disabled = teamCurrentPage === 1;
            document.getElementById('team-next-page').disabled = teamCurrentPage === totalPages;

            if(selectedTeamIds.size > 0) {
                stdHeader.classList.add('hidden');
                blkHeader.classList.remove('hidden');
                document.getElementById('selected-count-text').innerText = selectedTeamIds.size;
            } else {
                stdHeader.classList.remove('hidden');
                blkHeader.classList.add('hidden');
                document.getElementById('master-checkbox').outerHTML = `<div onclick="toggleAllTeams(event)" class="w-5 h-5 rounded-full border-2 border-gray-200 hover:border-[#FFC107] cursor-pointer transition-colors" id="master-checkbox"></div>`;
            }

            if (filteredData.length === 0) {
                tableList.innerHTML = `<div class="flex justify-center items-center py-20"><p class="text-[13px] text-gray-500 font-medium">No teams found</p></div>`;
                cardsList.innerHTML = `<div class="flex justify-center items-center py-14 col-span-full"><p class="text-[13px] text-gray-500 font-medium">No teams found</p></div>`;
                return;
            }

            let tableHTML = '';
            let cardsHTML = '';

            paginatedData.forEach(d => {
                const initial = d.name ? d.name.charAt(0).toUpperCase() : 'T';
                const isSelected = selectedTeamIds.has(d.id);
                const cardBorder = isSelected ? 'border-2 border-[#FFC107]' : 'border border-gray-200';
                const rowBg = isSelected ? 'bg-blue-50/20' : 'bg-white hover:bg-gray-50';
                
                const activeHtml = d.isActive ? `<span class="bg-[#FFB33F] text-[#111827] text-[11px] font-medium px-2.5 py-1 rounded-full inline-flex shadow-sm">Active</span>` : `<span class="bg-red-50 text-red-600 text-[11px] font-medium px-2.5 py-1 rounded-full inline-flex shadow-sm">Inactive</span>`;

                tableHTML += `
                <div class="grid grid-cols-12 gap-4 items-center py-2.5 px-6 border-b border-gray-100 ${rowBg} transition-colors group cursor-pointer" onclick="viewTeam('${d.id}', event)">
                    <div class="col-span-1">${isSelected ? getCheckedIcon(d.id) : getUncheckedIcon(d.id)}</div>
                    <div class="col-span-4 flex items-center space-x-3.5">
                        <i class="fi fi-rr-graphic-style text-[18px]" style="color: ${d.color};"></i>
                        <span class="text-[14px] font-medium text-gray-900 leading-snug">${d.name}</span>
                    </div>
                    <div class="col-span-2 flex items-center space-x-2">
                        <span class="w-[7px] h-[7px] rounded-full" style="background-color: ${d.color}"></span>
                        <span class="text-[12.5px] text-[#6B7280] font-mono-custom tracking-tight uppercase">${d.color}</span>
                    </div>
                    <div class="col-span-2 text-[13px] font-medium text-gray-600 font-mono-custom text-center">${d.chestNoSeries || 'Auto'}</div>
                    <div class="col-span-2 flex justify-center">${activeHtml}</div>
                    <div class="col-span-1 flex justify-end">${getActionMenu(d.id)}</div>
                </div>`;

                cardsHTML += `
                <div class="bg-white ${cardBorder} rounded-xl p-4 relative shadow-sm hover:shadow-md transition-shadow min-h-[140px] flex flex-col cursor-pointer" onclick="viewTeam('${d.id}', event)">
                    <div class="absolute top-4 right-4 z-10">${isSelected ? getCheckedIcon(d.id) : getUncheckedIcon(d.id)}</div>
                    
                    <div class="flex items-start space-x-3 relative z-0">
                        <i class="fi fi-rr-graphic-style text-[18px] mt-0.5" style="color: ${d.color};"></i>
                        <div class="flex-1">
                            <div class="text-[14.5px] font-semibold text-gray-900 pr-8">${d.name}</div>
                            <div class="flex items-center space-x-2 mt-1.5">
                                <span class="w-[7px] h-[7px] rounded-full" style="background-color: ${d.color}"></span>
                                <span class="text-[12px] text-[#6B7280] font-mono-custom tracking-tight uppercase">${d.color}</span>
                            </div>
                            <div class="text-[12px] text-gray-500 mt-2 font-mono-custom">Series: ${d.chestNoSeries || 'Auto'}</div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-end mt-auto relative z-0">
                        ${activeHtml}
                    </div>
                    <div class="absolute bottom-3 right-3 z-10">${getActionMenu(d.id)}</div>
                </div>`;
            });

            tableList.innerHTML = tableHTML;
            cardsList.innerHTML = cardsHTML;
        }

        window.toggleTeamSelection = function(id, event) {
            event.stopPropagation();
            if (selectedTeamIds.has(id)) selectedTeamIds.delete(id);
            else selectedTeamIds.add(id);
            renderTeamsUI();
        };

        window.toggleAllTeams = function(event) {
            if(event) event.stopPropagation();
            const filteredData = getFilteredTeams();
            if (selectedTeamIds.size === filteredData.length && filteredData.length > 0) selectedTeamIds.clear();
            else filteredData.forEach(c => selectedTeamIds.add(c.id));
            renderTeamsUI();
        };

        window.deleteSelectedTeams = function() {
            if(confirm(`Are you sure you want to delete ${selectedTeamIds.size} teams?`)) {
                if (typeof db !== 'undefined') {
                    const batch = db.batch();
                    selectedTeamIds.forEach(id => batch.delete(db.collection('teams').doc(id)));
                    batch.commit().then(() => {
                        selectedTeamIds.clear();
                        typeof showToast === 'function' && showToast("✅ Teams deleted!");
                    });
                } else {
                    teamsData = teamsData.filter(t => !selectedTeamIds.has(t.id));
                    selectedTeamIds.clear();
                    typeof showToast === 'function' && showToast("✅ Teams deleted!");
                    renderTeamsUI();
                }
            }
        };

        window.deleteSingleTeam = function(id, event) {
            event.stopPropagation();
            if(confirm(`Delete this team?`)) {
                if (typeof db !== 'undefined') {
                    db.collection('teams').doc(id).delete().then(() => {
                        selectedTeamIds.delete(id);
                        activeTeamDropdownId = null;
                        typeof showToast === 'function' && showToast("✅ Team deleted!");
                    });
                } else {
                    teamsData = teamsData.filter(t => t.id !== id);
                    selectedTeamIds.delete(id);
                    activeTeamDropdownId = null;
                    typeof showToast === 'function' && showToast("✅ Team deleted!");
                    renderTeamsUI();
                }
            }
        };

        window.openActionMenu = function(id, event) {
            event.stopPropagation();
            if (activeTeamDropdownId === id) {
                closeAllDropdowns();
                return;
            }
            activeTeamDropdownId = id;
            
            const btn = event.currentTarget;
            const rect = btn.getBoundingClientRect();
            const menu = document.getElementById('global-action-menu');
            
            menu.classList.remove('hidden');
            
            const menuHeight = menu.offsetHeight;
            let topPos = rect.bottom + 4;
            if (topPos + menuHeight > window.innerHeight) {
                topPos = rect.top - menuHeight - 4;
            }
            
            menu.style.top = topPos + 'px';
            menu.style.left = (rect.right - 144) + 'px';
            
            document.getElementById('btn-view').onclick = (e) => { window.teamCloseDropdowns(); viewTeam(id, e); };
            document.getElementById('btn-edit').onclick = (e) => { window.teamCloseDropdowns(); editTeam(id, e); };
            document.getElementById('btn-delete').onclick = (e) => { window.teamCloseDropdowns(); deleteSingleTeam(id, e); };
        };

        if (window.teamCloseDropdowns) {
            document.removeEventListener('click', window.teamCloseDropdowns);
            window.removeEventListener('scroll', window.teamCloseDropdowns, true);
        }

        window.teamCloseDropdowns = function(event) {
            const menu = document.getElementById('global-action-menu');
            if (event && event.type === 'click' && menu && menu.contains(event.target)) return;
            activeTeamDropdownId = null;
            if (menu) menu.classList.add('hidden');
        };

        document.addEventListener('click', window.teamCloseDropdowns);
        window.addEventListener('scroll', window.teamCloseDropdowns, true);

        // --- View Team Dashboard Logic ---
        window.viewTeam = function(id, event) {
            if(event) event.stopPropagation();
            const team = teamsData.find(t => t.id === id);
            if(!team) return;
            localStorage.setItem('viewTeamId', id);
            localStorage.setItem('viewTeamName', team.name);
            if (typeof loadModule === 'function') loadModule('viewTeamData');
        };

        window.openTeamSidebar = function() {
            editingTeamId = null;
            document.getElementById('teamSidebarTitle').innerText = "Add Team";
            document.getElementById('btn-save-team-text').innerText = "Save Team";
            document.getElementById('teamName').value = '';
            document.getElementById('teamSeries').value = '';
            document.getElementById('teamColorPicker').value = '#FF0000';
            document.getElementById('teamColorText').value = '#FF0000';
            document.getElementById('teamActive').checked = true;
            document.getElementById('teamOverlay').classList.remove('hidden');
            document.getElementById('teamSidebar').classList.remove('translate-x-full');
            setTimeout(() => document.getElementById('teamName').focus(), 320);
        };

        window.editTeam = function(id, event) {
            event.stopPropagation();
            const team = teamsData.find(t => t.id === id);
            if(!team) return;
            editingTeamId = id;
            activeTeamDropdownId = null;
            document.getElementById('teamSidebarTitle').innerText = "Edit Team";
            document.getElementById('btn-save-team-text').innerText = "Update Team";
            document.getElementById('teamName').value = team.name;
            document.getElementById('teamSeries').value = team.chestNoSeries || '';
            document.getElementById('teamColorPicker').value = team.color;
            document.getElementById('teamColorText').value = team.color;
            document.getElementById('teamActive').checked = team.isActive;
            document.getElementById('teamOverlay').classList.remove('hidden');
            document.getElementById('teamSidebar').classList.remove('translate-x-full');
        };

        window.closeTeamSidebar = function() {
            document.getElementById('teamOverlay').classList.add('hidden');
            document.getElementById('teamSidebar').classList.add('translate-x-full');
        };

        window.saveTeam = function() {
            const name = document.getElementById('teamName').value.trim();
            const color = document.getElementById('teamColorText').value.trim();
            const isActive = document.getElementById('teamActive').checked;
            const series = parseInt(document.getElementById('teamSeries').value) || 0;
            if(!name) return typeof showToast === 'function' ? showToast("❌ Team Name is required!") : alert("Name required");
            
            const payload = { name, color, isActive, chestNoSeries: series };
            if (typeof firebase !== 'undefined' && firebase.firestore) {
                payload.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
            }

            if(editingTeamId) {
                if(typeof db !== 'undefined') {
                    db.collection('teams').doc(editingTeamId).update(payload).then(() => {
                        window.closeTeamSidebar();
                        typeof showToast === 'function' && showToast("✅ Team updated!");
                    });
                } else {
                    const team = teamsData.find(t => t.id === editingTeamId);
                    Object.assign(team, payload);
                    window.closeTeamSidebar();
                    renderTeamsUI();
                }
            } else {
                if(typeof db !== 'undefined') {
                    if (typeof firebase !== 'undefined' && firebase.firestore) {
                        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    }
                    db.collection('teams').add(payload).then(() => {
                        window.closeTeamSidebar();
                        typeof showToast === 'function' && showToast("✅ Team added!");
                    });
                } else {
                    teamsData.unshift({ id: Date.now().toString(), ...payload });
                    window.closeTeamSidebar();
                    renderTeamsUI();
                }
            }
        };

        // Initial render
        renderTeamsUI();

        // Real-time listener setup
        if (typeof db !== 'undefined') {
            if (window.teamUnsub) window.teamUnsub();
            window.teamUnsub = db.collection('teams').orderBy('createdAt', 'desc').onSnapshot(snap => {
                teamsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTeamsUI();
            });
        }
    </script>
</body>
</html>
