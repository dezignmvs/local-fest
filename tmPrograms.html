<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Team Programs Manager</title>
</head>
<body>
    <div class="mb-6 shrink-0 pt-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h1 id="tmp-section-title" class="text-xl sm:text-[22px] font-semibold text-gray-900 leading-tight">Programs</h1>
            <p class="text-[13px] text-gray-500 mt-1">Register candidates for programs in your team</p>
        </div>
        <div class="relative w-full sm:w-64">
            <i class="fi fi-rr-search absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-[13px]"></i>
            <input type="text" id="tmp-search-input" oninput="window.renderTMPrograms()" placeholder="Search programs..." 
                class="w-full pl-9 pr-4 py-2 bg-white border border-gray-200 rounded-lg text-[13px] focus:outline-none focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue transition-all shadow-sm">
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 pb-6" id="tmp-programs-list">
        <div class="col-span-full py-16 text-center text-[13px] text-gray-400">
            <div class="w-6 h-6 border-2 border-gray-200 border-t-brand-blue rounded-full animate-spin mx-auto mb-3"></div>
            Fetching active programs...
        </div>
    </div>

    <script>
        document.getElementById('tmp-section-title').innerText = (window.currentTMSection || 'Section') + ' Programs';
        var section = window.currentTMSection;
        var team = localStorage.getItem('managerTeam');
        
        window.tmTeamCandidates = [];
        window.tmProgramsList = [];
        window.tmRegistrationsList = [];
        window.programSetsData = [];

        if (typeof db !== 'undefined' && section && team) {
            // Fetch Candidates
            db.collection('candidates').where('team', '==', team).where('section', '==', section).get().then(snap => {
                window.tmTeamCandidates = snap.docs.map(d => ({id: d.id, ...d.data()}));
                
                // Fetch Programs
                return db.collection('programs').where('section', '==', section).where('status', '==', true).get();
            }).then(snap => {
                window.tmProgramsList = snap.docs.map(d => ({id: d.id, ...d.data()}));
                
                return db.collection('programSets').get();
            }).then(snap => {
                window.programSetsData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                // Fetch Registrations Realtime
                if(window.tmProgUnsub) window.tmProgUnsub();
                window.tmProgUnsub = db.collection('registrations').where('team', '==', team).where('section', '==', section).onSnapshot(regSnap => {
                    window.tmRegistrationsList = regSnap.docs.map(d => ({id: d.id, ...d.data()}));
                    window.renderTMPrograms();
                });
            });
        }

        window.renderTMPrograms = function() {
            const container = document.getElementById('tmp-programs-list');
            const searchQ = (document.getElementById('tmp-search-input')?.value || '').toLowerCase().trim();
            
            let filtered = window.tmProgramsList || [];
            if (searchQ) {
                filtered = filtered.filter(p => (p.name && p.name.toLowerCase().includes(searchQ)) || (p.code && p.code.toLowerCase().includes(searchQ)));
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="col-span-full py-16 text-center text-[13px] text-gray-500 font-medium bg-white rounded-2xl shadow-sm border border-gray-100">No active programs found matching criteria.</div>';
                return;
            }

            container.innerHTML = filtered.map(p => {
                // Look up existing registration for this program
                const reg = window.tmRegistrationsList.find(r => r.programId === p.id);
                const prefilledChests = reg ? (reg.chestNumbers || []) : [];

                const maxP = p.maxParticipants || 1;
                let inputsHTML = '';
                
                for(let i=0; i<maxP; i++) {
                    const val = prefilledChests[i] || '';
                    const borderClass = val ? 'border-green-500 bg-green-50/20' : 'border-gray-200';
                    inputsHTML += `<input type="text" value="${val}" class="prog-input-${p.id} w-full px-3 py-2 ${borderClass} rounded-lg text-[13px] font-mono-custom focus:outline-none focus:ring-2 focus:ring-brand-blue/20 transition-all text-center placeholder:font-sans placeholder:text-gray-300" placeholder="Chest No ${i+1}" oninput="window.validateChest(this)">`;
                }

                return `
                <div class="bg-white rounded-2xl border border-gray-200 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.02)] p-5 flex flex-col hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <span class="text-[10px] font-bold text-brand-blue bg-blue-50 border border-blue-100 px-2 py-0.5 rounded-full mb-2 inline-block shadow-sm">${p.code} &bull; ${p.type}</span>
                            <h3 class="text-[15px] font-bold text-gray-900 leading-tight pr-4">${p.name}</h3>
                            <p class="text-[11px] text-gray-500 mt-1 font-medium">Max: ${maxP}</p>
                        </div>
                    </div>
                    <div class="mt-auto">
                        ${p.topicRegistration ? '<div class="text-[11px] text-purple-600 bg-purple-50 px-3 py-1.5 rounded-lg mb-3 flex items-center gap-2"><i class="fi fi-rr-info text-xs"></i> <span>Requires a Topic. Fill it in Topic Reg.</span></div>' : ''}
                        <div class="grid grid-cols-2 gap-2.5">
                            ${inputsHTML}
                        </div>
                        <button id="btn-save-${p.id}" onclick="window.saveRegistration('${p.id}')" class="w-full mt-4 bg-gray-50 hover:bg-[#FFB33F] text-gray-800 border border-gray-200 hover:border-transparent font-bold text-[12px] py-2.5 rounded-xl transition-all flex items-center justify-center gap-2">
                            <i class="fi fi-rr-disk text-xs"></i> ${reg ? 'Update' : 'Save'} Registration
                        </button>
                    </div>
                </div>`;
            }).join('');
        };

        window.validateChest = function(inputEl) {
            const val = inputEl.value.trim();
            inputEl.classList.remove('border-gray-200', 'border-red-500', 'border-green-500', 'bg-red-50/20', 'bg-green-50/20');
            if(!val) { inputEl.classList.add('border-gray-200'); return; }
            
            const found = window.tmTeamCandidates.find(c => c.chestNo === val);
            if(found) inputEl.classList.add('border-green-500', 'bg-green-50/20');
            else inputEl.classList.add('border-red-500', 'bg-red-50/20');
        };

        window.saveRegistration = function(progId) {
            const prog = window.tmProgramsList.find(p => p.id === progId);
            const inputs = document.querySelectorAll('.prog-input-' + progId);
            let chestNumbers = [], candidateIds = [];
            let valid = true, filledCount = 0;
            
            const btn = document.getElementById('btn-save-' + progId);
            const existing = window.tmRegistrationsList.find(r => r.programId === progId);

            inputs.forEach(inp => {
                const val = inp.value.trim();
                if(val) {
                    const found = window.tmTeamCandidates.find(c => c.chestNo === val);
                    if(found) { chestNumbers.push(val); candidateIds.push(found.id); filledCount++; } 
                    else valid = false;
                }
            });

            if(!valid) return typeof showToast === 'function' && showToast("❌ Contains invalid chest numbers. Must belong to your team & section.");

            if(new Set(chestNumbers).size !== chestNumbers.length) return typeof showToast === 'function' && showToast("❌ Duplicate chest numbers found.");

            if (prog.progSet) {
                const setRule = window.programSetsData.find(s => s.name === prog.progSet);
                if (setRule) {
                    const maxLimit = parseInt(setRule.maxCount) || 999;
                    for(let chest of chestNumbers) {
                        let currentSetCount = 0;
                        window.tmRegistrationsList.forEach(r => {
                            if (r.programId !== progId && r.chestNumbers && r.chestNumbers.includes(chest)) {
                                const rProg = window.tmProgramsList.find(p => p.id === r.programId);
                                if (rProg && rProg.progSet === prog.progSet) currentSetCount++;
                            }
                        });
                        if (currentSetCount + 1 > maxLimit) {
                            return typeof showToast === 'function' && showToast(`❌ Chest ${chest} reached max limit (${maxLimit}) for ${prog.progSet} programs.`);
                        }
                    }
                }
            }

            const payload = { programId: progId, programName: prog.name, programCode: prog.code, team: team, section: section, chestNumbers: chestNumbers, candidateIds: candidateIds, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
            
            btn.innerHTML = '<div class="w-3 h-3 border-2 border-gray-400 border-t-transparent rounded-full animate-spin"></div>'; btn.disabled = true;
            if(existing) db.collection('registrations').doc(existing.id).update(payload).then(() => { typeof showToast === 'function' && showToast("✅ Registration Updated!"); btn.innerHTML = '<i class="fi fi-rr-disk text-xs"></i> Update Registration'; btn.disabled = false; });
            else { payload.createdAt = firebase.firestore.FieldValue.serverTimestamp(); db.collection('registrations').add(payload).then(() => { typeof showToast === 'function' && showToast("✅ Registration Successful!"); btn.innerHTML = '<i class="fi fi-rr-disk text-xs"></i> Update Registration'; btn.disabled = false; }); }
        };
    </script>
</body>
</html>
